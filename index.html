<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RETRO ASSAULT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body { display: flex; align-items: center; justify-content: center; }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: none;
      touch-action: none;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';
const W = 320, H = 240, CW = 640, CH = 480;

const PAL = {
  BLACK:'#000000',DARKBLUE:'#1D2B53',PURPLE:'#7E2553',DARKGRN:'#008751',
  BROWN:'#AB5236',DARKGREY:'#5F574F',GREY:'#C2C3C7',WHITE:'#FFF1E8',
  RED:'#FF004D',ORANGE:'#FFA300',YELLOW:'#FFEC27',GREEN:'#00E436',
  CYAN:'#29ADFF',LAVENDER:'#83769C',PINK:'#FF77A8',PEACH:'#FFCCAA'
};

const WEAPONS = {
  pistol:  {name:'PISTOL',  rate:0.22, dmg:1,   count:1, spread:0,    spd:260, col:PAL.YELLOW,   ammo:-1},
  shotgun: {name:'SHOTGUN', rate:0.65, dmg:1,   count:5, spread:0.25, spd:200, col:PAL.ORANGE,   ammo:12},
  smg:     {name:'SMG',     rate:0.07, dmg:1,   count:1, spread:0.1,  spd:300, col:PAL.CYAN,     ammo:40},
  rocket:  {name:'ROCKET',  rate:1.2,  dmg:5,   count:1, spread:0,    spd:140, col:PAL.RED,      ammo:6,  explosive:true, blastR:20},
  laser:   {name:'LASER',   rate:0.12, dmg:2,   count:1, spread:0,    spd:420, col:PAL.GREEN,    ammo:25, piercing:true},
  plasma:  {name:'PLASMA',  rate:1.6,  dmg:12,  count:1, spread:0,    spd:80,  col:PAL.LAVENDER, ammo:4,  bouncing:true, maxBounces:3},
  freeze:  {name:'FREEZE',  rate:0.18, dmg:1,   count:1, spread:0.05, spd:280, col:'#C8F4FF',    ammo:30, freezing:true, freezeDuration:2.0},
  flame:   {name:'FLAME',   rate:0.04, dmg:0.5, count:3, spread:0.35, spd:140, col:PAL.ORANGE,   ammo:80, flame:true, range:80},
};

function rand(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(rand(a,b+0.999));}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function circlehit(ax,ay,bx,by,r){
  const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy<r*r;
}

// ── Input ─────────────────────────────────────────────────────────────────────
// Joy max throw as fraction of canvas display width (shared by input & draw)
const JOY_R = 0.075; // throw radius as fraction of CW

class InputHandler {
  constructor(canvas) {
    this.keys=new Set(); this.mouse={x:W/2,y:H/2};
    this.clicks=[]; this.anyKey=false; this._scale=1;
    this.isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
    // Left joystick: movement
    this.joystick={active:false,baseCSS:{x:0,y:0},knobCSS:{x:0,y:0},id:null};
    // Right joystick: aim + fire
    this.rightJoy={active:false,baseCSS:{x:0,y:0},knobCSS:{x:0,y:0},id:null,angle:0,magnitude:0};
    this.pendingWeaponSwitch=null;

    window.addEventListener('keydown',e=>{
      this.keys.add(e.code); this.anyKey=true;
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
    });
    window.addEventListener('keyup',e=>this.keys.delete(e.code));
    canvas.addEventListener('mousemove',e=>{
      const r=canvas.getBoundingClientRect();
      this.mouse.x=(e.clientX-r.left)/this._scale/2;
      this.mouse.y=(e.clientY-r.top)/this._scale/2;
    });
    canvas.addEventListener('mousedown',e=>{
      if(e.button===0){
        const r=canvas.getBoundingClientRect();
        this.clicks.push({x:(e.clientX-r.left)/this._scale/2,y:(e.clientY-r.top)/this._scale/2});
        this.anyKey=true;
      }
    });
    canvas.addEventListener('touchstart',e=>{e.preventDefault();this._onTouchStart(e,canvas);},{passive:false});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();this._onTouchMove(e,canvas);},{passive:false});
    canvas.addEventListener('touchend',e=>{e.preventDefault();this._onTouchEnd(e);},{passive:false});
    canvas.addEventListener('touchcancel',e=>{e.preventDefault();this._onTouchEnd(e);},{passive:false});
  }
  // Fire whenever right joystick is deflected past 15%
  get isFiring(){return this.rightJoy.active&&this.rightJoy.magnitude>0.15;}
  _pos(touch,canvas){
    const r=canvas.getBoundingClientRect();
    return {cssX:touch.clientX-r.left,cssY:touch.clientY-r.top,
      gameX:(touch.clientX-r.left)/this._scale/2,
      gameY:(touch.clientY-r.top)/this._scale/2,cw:r.width,ch:r.height};
  }
  _onTouchStart(e,canvas){
    this.anyKey=true; this.isMobile=true;
    for(const t of e.changedTouches){
      const p=this._pos(t,canvas);
      // Weapon buttons hit test (bottom-center strip in CW/CH canvas space)
      if(this._checkWeaponButtons(p.gameX*2,p.gameY*2))continue;
      if(p.cssX<p.cw*0.5&&!this.joystick.active){
        // Left half → movement joystick
        this.joystick.active=true;this.joystick.id=t.identifier;
        this.joystick.baseCSS={x:p.cssX,y:p.cssY};
        this.joystick.knobCSS={x:p.cssX,y:p.cssY};
      } else if(p.cssX>=p.cw*0.5&&!this.rightJoy.active){
        // Right half → aim joystick
        this.rightJoy.active=true;this.rightJoy.id=t.identifier;
        this.rightJoy.baseCSS={x:p.cssX,y:p.cssY};
        this.rightJoy.knobCSS={x:p.cssX,y:p.cssY};
        this.rightJoy.magnitude=0;
        // Click for menu/any-key detection
        this.clicks.push({x:p.gameX,y:p.gameY});
      }
    }
  }
  _onTouchMove(e,canvas){
    for(const t of e.changedTouches){
      const p=this._pos(t,canvas);
      if(t.identifier===this.joystick.id){
        this.joystick.knobCSS={x:p.cssX,y:p.cssY};
        const dx=p.cssX-this.joystick.baseCSS.x,dy=p.cssY-this.joystick.baseCSS.y;
        const mag=Math.sqrt(dx*dx+dy*dy),maxT=p.cw*JOY_R;
        if(mag>6){
          const nx=dx/Math.max(mag,maxT),ny=dy/Math.max(mag,maxT);
          if(nx<-0.28)this.keys.add('KeyA');else this.keys.delete('KeyA');
          if(nx>0.28) this.keys.add('KeyD');else this.keys.delete('KeyD');
          if(ny<-0.28)this.keys.add('KeyW');else this.keys.delete('KeyW');
          if(ny>0.28) this.keys.add('KeyS');else this.keys.delete('KeyS');
        } else {['KeyA','KeyD','KeyW','KeyS'].forEach(k=>this.keys.delete(k));}
      } else if(t.identifier===this.rightJoy.id){
        this.rightJoy.knobCSS={x:p.cssX,y:p.cssY};
        const dx=p.cssX-this.rightJoy.baseCSS.x,dy=p.cssY-this.rightJoy.baseCSS.y;
        const mag=Math.sqrt(dx*dx+dy*dy),maxT=p.cw*JOY_R;
        this.rightJoy.magnitude=Math.min(mag/maxT,1);
        if(mag>5)this.rightJoy.angle=Math.atan2(dy,dx);
      }
    }
  }
  _onTouchEnd(e){
    for(const t of e.changedTouches){
      if(t.identifier===this.joystick.id){
        this.joystick.active=false;this.joystick.id=null;
        ['KeyA','KeyD','KeyW','KeyS'].forEach(k=>this.keys.delete(k));
      } else if(t.identifier===this.rightJoy.id){
        this.rightJoy.active=false;this.rightJoy.id=null;this.rightJoy.magnitude=0;
      }
    }
  }
  _checkWeaponButtons(hx,hy){
    // hx,hy in CW/CH canvas coords (0..640, 0..480)
    const slots=Object.keys(WEAPONS);
    const btnW=38,gap=3,totalW=slots.length*(btnW+gap)-gap;
    const startX=(CW-totalW)/2,startY=CH-36,btnH=30;
    for(let i=0;i<slots.length;i++){
      if(hx>=startX+i*(btnW+gap)&&hx<=startX+i*(btnW+gap)+btnW&&hy>=startY&&hy<=startY+btnH){
        this.pendingWeaponSwitch=slots[i];return true;
      }
    }
    return false;
  }
  isDown(c){return this.keys.has(c);}
  consumeClicks(){const c=this.clicks.slice();this.clicks=[];return c;}
  consumeAnyKey(){const v=this.anyKey;this.anyKey=false;return v;}
}

// ── Particle ──────────────────────────────────────────────────────────────────
class Particle {
  constructor(x,y,vx,vy,color,life,size=2){
    Object.assign(this,{x,y,vx,vy,color,life,maxLife:life,size,dead:false});
  }
  update(dt){
    this.x+=this.vx*dt; this.y+=this.vy*dt; this.vy+=60*dt;
    this.life-=dt; if(this.life<=0)this.dead=true;
  }
  draw(ctx){
    ctx.globalAlpha=this.life/this.maxLife;
    ctx.fillStyle=this.color;
    ctx.fillRect(Math.round(this.x-this.size/2),Math.round(this.y-this.size/2),this.size,this.size);
    ctx.globalAlpha=1;
  }
}
function spawnExp(p,x,y,col,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=rand(20,90);
    p.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s-20,col,rand(0.3,0.6),randInt(1,3)));
  }
}
function spawnBlast(p,x,y){
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2,s=rand(30,120);
    p.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,PAL.ORANGE,rand(0.2,0.5),randInt(2,4)));
    p.push(new Particle(x,y,Math.cos(a)*s*0.5,Math.sin(a)*s*0.5,PAL.YELLOW,rand(0.3,0.6),2));
  }
}
function spawnHit(p,x,y,col){
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2;
    p.push(new Particle(x,y,Math.cos(a)*rand(30,60),Math.sin(a)*rand(30,60),col,0.2,1));
  }
}
function spawnMuzzle(p,x,y,angle){
  for(let i=0;i<4;i++){
    const a=angle+rand(-0.4,0.4);
    p.push(new Particle(x,y,Math.cos(a)*rand(40,80),Math.sin(a)*rand(40,80),PAL.YELLOW,0.08,2));
  }
}

// ── Bullet ────────────────────────────────────────────────────────────────────
class Bullet {
  constructor(x,y,angle,owner){
    this.x=x;this.y=y;this.angle=angle;this.owner=owner;
    this.speed=260;this.damage=1;this.dead=false;
    this.color=PAL.YELLOW;this.trail=[];
    this.explosive=false;this.blastR=0;this.piercing=false;
    this.hitEnemies=new Set();
    this.bouncing=false;this.bounces=0;this.vx=0;this.vy=0;
    this.freezing=false;this.freezeDuration=0;
    this.flame=false;this.range=0;this.distTravelled=0;
  }
  update(dt){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>5)this.trail.shift();
    if(this.bouncing){
      this.x+=this.vx*dt;this.y+=this.vy*dt;
      let bounced=false;
      if(this.x<=0){this.vx=Math.abs(this.vx);this.x=1;bounced=true;}
      else if(this.x>=W){this.vx=-Math.abs(this.vx);this.x=W-1;bounced=true;}
      if(this.y<=0){this.vy=Math.abs(this.vy);this.y=1;bounced=true;}
      else if(this.y>=H){this.vy=-Math.abs(this.vy);this.y=H-1;bounced=true;}
      if(bounced){this.bounces--;if(this.bounces<0)this.dead=true;}
    } else if(this.flame){
      this.x+=Math.cos(this.angle)*this.speed*dt;
      this.y+=Math.sin(this.angle)*this.speed*dt;
      this.distTravelled+=this.speed*dt;
      if(this.distTravelled>=this.range)this.dead=true;
    } else {
      this.x+=Math.cos(this.angle)*this.speed*dt;
      this.y+=Math.sin(this.angle)*this.speed*dt;
      if(this.x<-10||this.x>W+10||this.y<-10||this.y>H+10)this.dead=true;
    }
  }
  draw(ctx){
    const isP=this.owner==='player';
    const trailCol=this.flame?PAL.YELLOW:(isP?PAL.ORANGE:PAL.PINK);
    for(let i=0;i<this.trail.length;i++){
      ctx.globalAlpha=(i+1)/(this.trail.length+1)*0.6;
      ctx.fillStyle=trailCol;
      ctx.fillRect(Math.round(this.trail[i].x)-1,Math.round(this.trail[i].y)-1,2,2);
    }
    ctx.globalAlpha=1;
    if(this.bouncing){
      ctx.globalAlpha=0.3;ctx.fillStyle=PAL.LAVENDER;
      ctx.fillRect(Math.round(this.x)-4,Math.round(this.y)-4,8,8);
      ctx.globalAlpha=1;
      ctx.fillStyle=PAL.LAVENDER;ctx.fillRect(Math.round(this.x)-2,Math.round(this.y)-2,4,4);
      ctx.fillStyle=PAL.WHITE;ctx.fillRect(Math.round(this.x)-1,Math.round(this.y)-1,2,2);
    } else {
      const sz=this.explosive?3:2;
      ctx.fillStyle=this.explosive?PAL.RED:(this.piercing?PAL.GREEN:PAL.WHITE);
      ctx.fillRect(Math.round(this.x)-Math.floor(sz/2),Math.round(this.y)-Math.floor(sz/2),sz,sz);
      let col=this.color;
      if(this.flame){
        const t=this.range>0?this.distTravelled/this.range:0;
        col=t<0.3?PAL.YELLOW:t<0.6?PAL.ORANGE:PAL.RED;
      }
      ctx.fillStyle=col;
      ctx.fillRect(Math.round(this.x)-1,Math.round(this.y)-1,2,2);
    }
  }
}

// ── Pickup ────────────────────────────────────────────────────────────────────
class Pickup {
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;
    this.dead=false;this.bob=0;this.lifetime=12;this.r=6;
  }
  update(dt){
    this.bob+=dt*3;this.lifetime-=dt;
    if(this.lifetime<=0)this.dead=true;
  }
  draw(ctx){
    const bx=Math.round(this.x),by=Math.round(this.y+Math.sin(this.bob)*1.5);
    const fade=this.lifetime<2?this.lifetime/2:1;
    ctx.globalAlpha=fade;
    ctx.strokeStyle=this._color();ctx.lineWidth=0.5;
    ctx.beginPath();ctx.arc(bx,by,this.r+1,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.arc(bx,by,this.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=this._color();
    this._drawIcon(ctx,bx,by);
    ctx.globalAlpha=1;
  }
  _color(){
    if(this.type==='heart')return PAL.RED;
    if(this.type==='shield')return PAL.CYAN;
    if(this.type==='speed')return PAL.GREEN;
    if(this.type==='ammo')return PAL.YELLOW;
    const w=this.type.replace('weapon_','');
    return WEAPONS[w]?WEAPONS[w].col:PAL.GREY;
  }
  _drawIcon(ctx,x,y){
    const t=this.type;
    ctx.fillStyle=this._color();
    if(t==='heart'){
      ctx.fillRect(x-3,y+1,2,2);ctx.fillRect(x,y+1,2,2);
      ctx.fillRect(x-3,y-1,2,1);ctx.fillRect(x,y-1,2,1);
      ctx.fillRect(x-3,y+3,5,1);ctx.fillRect(x-2,y+4,3,1);ctx.fillRect(x-1,y+5,1,1);
    } else if(t==='shield'){
      ctx.fillRect(x-3,y-3,6,5);ctx.fillRect(x-2,y+2,4,1);ctx.fillRect(x-1,y+3,2,1);
    } else if(t==='speed'){
      ctx.fillRect(x-4,y-1,5,2);ctx.fillRect(x-2,y-3,3,2);ctx.fillRect(x-2,y+1,3,2);
    } else if(t==='ammo'){
      ctx.fillRect(x-3,y-3,2,6);ctx.fillRect(x,y-3,2,6);ctx.fillRect(x-2,y-4,5,1);
    } else {
      ctx.fillRect(x-4,y-1,7,2);ctx.fillRect(x-2,y-2,3,1);
    }
  }
}

// ── Player ────────────────────────────────────────────────────────────────────
class Player {
  constructor(x,y){
    this.x=x;this.y=y;this.w=10;this.h=12;
    this.speed=70;this.hp=3;this.maxHp=5;
    this.angle=0;this.shootCooldown=0;
    this.animFrame=0;this.animTimer=0;this.facing=1;this.invincible=0;
    this.weapon='pistol';
    this.ammo={shotgun:0,smg:0,rocket:0,laser:0,plasma:0,freeze:0,flame:0};
    this.shield=0;this.speedBoost=0;
  }
  update(dt,input,bullets,particles,game){
    let dx=0,dy=0;
    if(input.isDown('KeyA')||input.isDown('ArrowLeft'))dx-=1;
    if(input.isDown('KeyD')||input.isDown('ArrowRight'))dx+=1;
    if(input.isDown('KeyW')||input.isDown('ArrowUp'))dy-=1;
    if(input.isDown('KeyS')||input.isDown('ArrowDown'))dy+=1;
    if(dx!==0&&dy!==0){dx*=0.7071;dy*=0.7071;}
    const sp=this.speed*(this.speedBoost>0?1.7:1);
    if(dx!==0||dy!==0){
      this.x+=dx*sp*dt;this.y+=dy*sp*dt;
      if(dx!==0)this.facing=Math.sign(dx);
    }
    this.animTimer+=dt;
    if(this.animTimer>=0.11){this.animTimer=0;this.animFrame^=1;}
    this.x=clamp(this.x,8,W-8);this.y=clamp(this.y,8,H-8);
    // Aim: right joystick on mobile, mouse on desktop
    if(input.isMobile&&input.rightJoy.active&&input.rightJoy.magnitude>0.1){
      this.angle=input.rightJoy.angle;
    } else {
      this.angle=Math.atan2(input.mouse.y-this.y,input.mouse.x-this.x);
    }
    // Aim assist (mobile only): gently snap toward nearest enemy in cone
    if(input.isMobile&&game&&game.enemies&&game.enemies.length>0){
      const ax=Math.cos(this.angle),ay=Math.sin(this.angle);
      let bestDot=0.6,bestAngle=this.angle; // 0.6 ≈ within ~53°
      for(const e of game.enemies){
        if(e.dead)continue;
        const ex=e.x-this.x,ey=e.y-this.y;
        const dist=Math.sqrt(ex*ex+ey*ey);
        if(dist<8||dist>200)continue;
        const dot=ax*(ex/dist)+ay*(ey/dist);
        if(dot>bestDot){bestDot=dot;bestAngle=Math.atan2(ey,ex);}
      }
      if(bestAngle!==this.angle){
        let diff=bestAngle-this.angle;
        while(diff>Math.PI)diff-=Math.PI*2;
        while(diff<-Math.PI)diff+=Math.PI*2;
        this.angle+=diff*0.18; // 18% blend toward target
      }
    }
    this.shootCooldown-=dt;
    if(this.invincible>0)this.invincible-=dt;
    if(this.shield>0)this.shield-=dt;
    if(this.speedBoost>0)this.speedBoost-=dt;
    // mobile weapon switch
    if(input.pendingWeaponSwitch){
      const pw=input.pendingWeaponSwitch;
      if(pw==='pistol'||this.ammo[pw]>0)this.weapon=pw;
      input.pendingWeaponSwitch=null;
    }
    // keyboard weapon switch 1-8
    const wkeys=[['Digit1','pistol'],['Digit2','shotgun'],['Digit3','smg'],['Digit4','rocket'],['Digit5','laser'],['Digit6','plasma'],['Digit7','freeze'],['Digit8','flame']];
    for(const[k,w]of wkeys){
      if(input.isDown(k)&&(w==='pistol'||this.ammo[w]>0))this.weapon=w;
    }
    const clicks=input.consumeClicks();
    if((clicks.length>0||input.isFiring)&&this.shootCooldown<=0)this._shoot(bullets,particles,game);
  }
  _shoot(bullets,particles,game){
    const w=WEAPONS[this.weapon];
    const tipX=this.x+Math.cos(this.angle)*12;
    const tipY=this.y+Math.sin(this.angle)*12;
    for(let i=0;i<w.count;i++){
      const a=this.angle+(Math.random()-0.5)*w.spread*2;
      const b=new Bullet(tipX,tipY,a,'player');
      b.speed=w.spd;b.damage=w.dmg;b.color=w.col;
      b.explosive=w.explosive||false;b.blastR=w.blastR||0;b.piercing=w.piercing||false;
      b.bouncing=w.bouncing||false;
      if(w.bouncing){b.vx=Math.cos(a)*w.spd;b.vy=Math.sin(a)*w.spd;b.bounces=w.maxBounces||0;}
      b.freezing=w.freezing||false;b.freezeDuration=w.freezeDuration||0;
      b.flame=w.flame||false;b.range=w.range||0;
      bullets.push(b);
    }
    spawnMuzzle(particles,tipX,tipY,this.angle);
    this.shootCooldown=w.rate;
    if(w.ammo>0){
      this.ammo[this.weapon]--;
      if(this.ammo[this.weapon]<=0)this.weapon='pistol';
    }
    if(game.audio)game.audio.shoot(this.weapon);
  }
  pickupWeapon(type){
    const w=type.replace('weapon_','');
    this.ammo[w]=(this.ammo[w]||0)+WEAPONS[w].ammo;
    this.weapon=w;
  }
  takeDamage(){
    if(this.invincible>0||this.shield>0)return false;
    this.hp--;this.invincible=1.5;return true;
  }
  draw(ctx){
    const px=Math.round(this.x),py=Math.round(this.y);
    const blink=this.invincible>0&&Math.floor(this.invincible*10)%2===0;

      }

      ctx.fillStyle=PAL.DARKGREY;

      ctx.fillStyle=PAL.BROWN;ctx.fillRect(-4,2,8,1);
      ctx.fillStyle=PAL.DARKGRN;ctx.fillRect(-4,-4,8,7);

      ctx.fillStyle=PAL.PEACH;ctx.fillRect(-3,-10,6,6);
      ctx.fillStyle=PAL.DARKGREY;ctx.fillRect(-4,-12,7,4);ctx.fillRect(-4,-9,1,2);ctx.fillRect(3,-9,1,2);
      ctx.fillStyle='#3A3530';ctx.fillRect(-3,-9,6,1);
      ctx.fillStyle=PAL.DARKBLUE;ctx.fillRect(1,-8,1,1);
      ctx.restore();
    }
    ctx.save();ctx.translate(px,py);ctx.rotate(this.angle);

    ctx.fillStyle=PAL.BLACK;ctx.fillRect(13,0,1,1);

  }
}

// ── Enemy base ────────────────────────────────────────────────────────────────
class Enemy {
  constructor(x,y){
    this.x=x;this.y=y;this.w=10;this.h=12;
    this.hp=1;this.maxHp=1;this.speed=30;
    this.animFrame=0;this.animTimer=0;this.angle=0;
    this.scoreValue=100;this.dead=false;this.hitFlash=0;
    this.dropChance=0.15;this.isBoss=false;
    this.frozen=0;this.slowFactor=0.3;
  }
  update(dt,player){
    if(this.frozen>0)this.frozen-=dt;
    const spd=this.frozen>0?this.speed*this.slowFactor:this.speed;
    const dx=player.x-this.x,dy=player.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1){
      this.x+=(dx/dist)*spd*dt;this.y+=(dy/dist)*spd*dt;
      this.angle=Math.atan2(dy,dx);
    }
    this.animTimer+=dt;if(this.animTimer>=0.15){this.animTimer=0;this.animFrame^=1;}
    if(this.hitFlash>0)this.hitFlash-=dt;
  }
  takeDamage(dmg){
    this.hp-=dmg;this.hitFlash=0.08;
    if(this.hp<=0)this.dead=true;
  }
  drawHpBar(ctx,w=14){
    if(this.hp===this.maxHp)return;
    const bx=Math.round(this.x)-w/2,by=Math.round(this.y)-16;
    ctx.fillStyle='#330000';ctx.fillRect(bx,by,w,2);
    ctx.fillStyle=PAL.RED;ctx.fillRect(bx,by,Math.round(w*this.hp/this.maxHp),2);
  }
}

// ── Boss 1 : Tank Commander ───────────────────────────────────────────────────
class Boss1 extends Enemy {
  constructor(x,y){
    super(x,y);this.w=28;this.h=32;this.hp=80;this.maxHp=80;
    this.speed=14;this.scoreValue=3000;this.isBoss=true;
    this.phase=1;this.shootTimer=0;this.chargeTimer=0;
    this.charging=false;this.chargeVx=0;this.chargeVy=0;
    this.chargeTime=0;this.name='TANK COMMANDER';
    this.dropChance=1;this.dropType='weapon_rocket';
  }
  update(dt,player,bullets){
    const hpR=this.hp/this.maxHp;
    if(hpR<0.5&&this.phase===1){this.phase=2;this.speed=22;}
    if(hpR<0.25&&this.phase===2){this.phase=3;this.speed=30;}
    const dx=player.x-this.x,dy=player.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    this.angle=Math.atan2(dy,dx);
    if(this.hitFlash>0)this.hitFlash-=dt;
    this.animTimer+=dt;if(this.animTimer>=0.2){this.animTimer=0;this.animFrame^=1;}
    if(this.charging){
      this.x+=this.chargeVx*dt;this.y+=this.chargeVy*dt;
      this.chargeTime-=dt;
      if(this.chargeTime<=0){this.charging=false;}
      this.x=clamp(this.x,14,W-14);this.y=clamp(this.y,16,H-16);
    } else {
      if(dist>1){this.x+=(dx/dist)*this.speed*dt;this.y+=(dy/dist)*this.speed*dt;}
      this.x=clamp(this.x,14,W-14);this.y=clamp(this.y,16,H-16);
    }
    this.shootTimer-=dt;
    if(this.shootTimer<=0){
      if(this.phase===1){this.shootTimer=1.8;this._shoot3(bullets);}
      else if(this.phase===2){
        this.shootTimer=1.2;this._shoot5(bullets);
        if(Math.random()<0.3){this.charging=true;const a=this.angle;this.chargeVx=Math.cos(a)*100;this.chargeVy=Math.sin(a)*100;this.chargeTime=0.5;}
      } else {
        this.shootTimer=0.8;this._shoot8(bullets);
        if(!this.charging&&Math.random()<0.4){this.charging=true;const a=this.angle;this.chargeVx=Math.cos(a)*130;this.chargeVy=Math.sin(a)*130;this.chargeTime=0.45;}
      }
    }
  }
  _shoot3(bullets){for(let i=-1;i<=1;i++){const b=new Bullet(this.x,this.y,this.angle+i*0.25,'enemy');b.speed=80;bullets.push(b);}}
  _shoot5(bullets){for(let i=-2;i<=2;i++){const b=new Bullet(this.x,this.y,this.angle+i*0.22,'enemy');b.speed=90;bullets.push(b);}}
  _shoot8(bullets){for(let i=0;i<8;i++){const b=new Bullet(this.x,this.y,this.angle+i*Math.PI/4,'enemy');b.speed=100;bullets.push(b);}}
  draw(ctx){
    const px=Math.round(this.x),py=Math.round(this.y);
    ctx.save();ctx.translate(px,py);
    if(this.hitFlash>0){ctx.fillStyle=PAL.WHITE;ctx.fillRect(-14,-20,28,32);ctx.restore();return;}
    const bodyCol=this.phase===3?PAL.RED:(this.phase===2?PAL.ORANGE:PAL.BROWN);
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.ellipse(0,16,14,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2A1A0A';const f=this.animFrame;
    if(f===0){ctx.fillRect(-10,8,8,10);ctx.fillRect(4,11,8,7);}
    else{ctx.fillRect(-10,11,8,7);ctx.fillRect(4,8,8,10);}
    ctx.fillStyle=bodyCol;ctx.fillRect(-12,-8,24,16);
    ctx.fillStyle=PAL.DARKGREY;ctx.fillRect(-14,-10,6,5);ctx.fillRect(8,-10,6,5);
    ctx.fillStyle='#7A3A16';ctx.fillRect(-8,-6,16,10);
    ctx.fillStyle=PAL.DARKGREY;ctx.fillRect(-4,-4,8,6);
    ctx.save();ctx.rotate(this.angle);
    ctx.fillStyle=PAL.DARKGREY;ctx.fillRect(10,-3,14,6);
    ctx.fillStyle=bodyCol;ctx.fillRect(8,-4,6,8);
    ctx.fillStyle=PAL.BLACK;ctx.fillRect(23,-1,2,2);
    ctx.restore();
    ctx.fillStyle=bodyCol;ctx.fillRect(-8,-20,16,12);
    ctx.fillStyle=PAL.DARKBLUE;ctx.fillRect(-6,-17,12,5);
    ctx.fillStyle=PAL.CYAN;ctx.fillRect(-4,-15,3,2);ctx.fillRect(2,-15,3,2);
    if(this.phase>=2){ctx.fillStyle=PAL.RED;ctx.fillRect(-4,-15,3,2);ctx.fillRect(2,-15,3,2);}
    if(this.phase===3){ctx.globalAlpha=0.4+0.3*Math.sin(Date.now()/80);ctx.fillStyle=PAL.RED;ctx.fillRect(-14,-22,28,34);ctx.globalAlpha=1;}
    ctx.restore();this.drawHpBar(ctx,28);
  }
}

    if(this.phase===3){ctx.globalAlpha=0.3+0.2*Math.sin(Date.now()/60);ctx.fillStyle=PAL.RED;ctx.fillRect(-16,-30,32,40);ctx.globalAlpha=1;}
    ctx.restore();this.drawHpBar(ctx,32);
  }
}

// ── Level Manager ─────────────────────────────────────────────────────────────
class LevelManager {
  constructor(game){
    this.game=game;this.currentLevel=1;this.maxLevel=15;
    this.spawnQueue=[];this.spawnTimer=0;this.levelComplete=false;
    this.isBonus=false;this.bonusTime=0;this.bonusKills=0;this.bonusTarget=0;
    this.isBossLevel=false;
  }
  loadLevel(n){
    this.currentLevel=n;this.levelComplete=false;
    this.isBonus=false;this.isBossLevel=false;
    this.spawnQueue=this._buildQueue(n);this.spawnTimer=1.5;
    this.game.enemies=[];this.game.bullets=[];this.game.pickups=[];
    this.game.player.x=W/2;this.game.player.y=H/2;
  }
  _buildQueue(n){
    const q=[];
    const iv=[0,2.2,1.8,1.4,1.2,1.0,0.9,0.8,0.75,0.65,0.6,0.5,0.45,0.4,0.35,0.3][Math.min(n,15)];
    const add=(type,count,delay)=>{for(let i=0;i<count;i++)q.push({type,delay:delay!==undefined?delay:iv});};
    if(n===1){add('grunt',8);}
    else if(n===2){add('grunt',12);add('fast',2);}
    else if(n===3){this.isBossLevel=true;add('grunt',4);add('boss3',1,2.5);}
    else if(n===4){
      this.isBonus=true;this.bonusTime=25;this.bonusKills=0;this.bonusTarget=15;
      add('grunt',12);add('fast',6);}
    else if(n===5){add('grunt',14);add('tank',3);add('fast',4);}
    else if(n===6){this.isBossLevel=true;add('shooter',4);add('boss4',1,2.5);}
    else if(n===7){add('grunt',18);add('fast',8);add('tank',4);add('shooter',4);}
    else if(n===8){this.isBossLevel=true;add('boss1',1);}
    else if(n===9){add('grunt',20);add('fast',10);add('shooter',6);}
    else if(n===10){add('grunt',20);add('tank',5);add('fast',8);add('shooter',6);}
    else if(n===11){this.isBossLevel=true;add('fast',6);add('shooter',4);add('boss5',1,2.5);}
    else if(n===12){
      this.isBonus=true;this.bonusTime=20;this.bonusKills=0;this.bonusTarget=20;
      add('fast',12);add('grunt',10);}
    else if(n===13){this.isBossLevel=true;add('tank',6);add('shooter',4);add('boss6',1,2.5);}
    else if(n===14){add('grunt',28);add('fast',18);add('tank',8);add('shooter',10);}
    else if(n===15){this.isBossLevel=true;add('boss2',1);}
    return q;
  }
  _spawnAt(type){
    const side=randInt(0,3);let x,y;
    if(side===0){x=rand(0,W);y=-20;}
    else if(side===1){x=W+20;y=rand(0,H);}
    else if(side===2){x=rand(0,W);y=H+20;}
    else{x=-20;y=rand(0,H);}
    if(type==='grunt')return new GruntEnemy(x,y);
    if(type==='tank')return new TankEnemy(x,y);
    if(type==='fast')return new FastEnemy(x,y);
    if(type==='shooter')return new ShooterEnemy(x,y);
    if(type==='boss1')return new Boss1(W/2,-40);
    if(type==='boss2')return new Boss2(W/2,-50);
    if(type==='boss3')return new Boss3(W/2,-40);
    if(type==='boss4')return new Boss4(W/2,-40);
    if(type==='boss5')return new Boss5(W/2,-50);
    if(type==='boss6')return new Boss6(W/2,-50);
  }
  update(dt){
    if(this.isBonus){
      this.bonusTime-=dt;
      if(this.bonusTime<=0){
        this.levelComplete=true;this.game.score+=this.bonusKills*200;
        this.game.state='LEVEL_COMPLETE';
        if(game.audio)game.audio.levelUp();return;
      }
    }
    if(this.spawnQueue.length>0){
      this.spawnTimer-=dt;
      if(this.spawnTimer<=0){
        const next=this.spawnQueue.shift();
        this.game.enemies.push(this._spawnAt(next.type));
        this.spawnTimer=next.delay;
      }
    }
    if(this.spawnQueue.length===0&&this.game.enemies.length===0&&!this.levelComplete){
      this.levelComplete=true;
      if(this.currentLevel>=this.maxLevel){this.game.state='VICTORY';}
      else{this.game.bonusTimer=2.0;this.game.state='LEVEL_COMPLETE';}
      if(game.audio)game.audio.levelUp();
    }
  }
  nextLevel(){
    if(this.currentLevel>=this.maxLevel){this.game.state='VICTORY';return;}
    this.loadLevel(this.currentLevel+1);this.game.state='PLAYING';
  }
}

// ── Audio ─────────────────────────────────────────────────────────────────────
class RetroAudio {
  constructor(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  _b(freq,dur,type='square',vol=0.07){
    if(!this.ctx)return;
    try{
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.connect(g);g.connect(this.ctx.destination);
      o.type=type;o.frequency.setValueAtTime(freq,this.ctx.currentTime);
      g.gain.setValueAtTime(vol,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,this.ctx.currentTime+dur);
      o.start();o.stop(this.ctx.currentTime+dur);
    }catch(e){}
  }
  shoot(w='pistol'){
    if(w==='shotgun'){this._b(220,0.08,'square',0.08);this._b(440,0.05,'square',0.05);}
    else if(w==='smg'){this._b(660,0.04,'square',0.04);}
    else if(w==='rocket'){this._b(120,0.15,'sawtooth',0.1);this._b(60,0.2,'square',0.08);}
    else if(w==='laser'){this._b(1200,0.08,'sine',0.05);this._b(800,0.08,'sine',0.03);}
    else if(w==='plasma'){this._b(60,0.25,'sawtooth',0.1);this._b(220,0.35,'sine',0.06);}
    else if(w==='freeze'){this._b(1400,0.1,'sine',0.04);this._b(1000,0.15,'sine',0.03);}
    else if(w==='flame'){this._b(180,0.06,'sawtooth',0.05);}
    else this._b(880,0.05,'square',0.05);
  }
  hit(){this._b(220,0.1,'sawtooth',0.06);}
  explosion(){this._b(80,0.3,'sawtooth',0.1);this._b(40,0.4,'square',0.08);}
  die(){this._b(110,0.25,'sawtooth',0.07);this._b(55,0.35,'square',0.05);}
  playerHit(){this._b(160,0.2,'sawtooth',0.09);}
  pickup(){[880,1047].forEach((f,i)=>setTimeout(()=>this._b(f,0.1,'sine',0.08),i*60));}
  levelUp(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this._b(f,0.15),i*100));}
  gameOver(){[440,330,220,110].forEach((f,i)=>setTimeout(()=>this._b(f,0.2,'sawtooth'),i*150));}
  bossWarning(){[220,220,330].forEach((f,i)=>setTimeout(()=>this._b(f,0.3,'sawtooth',0.12),i*200));}
}

// ── Background ────────────────────────────────────────────────────────────────
function buildBackground(){
  const bg=document.createElement('canvas');bg.width=W;bg.height=H;
  const c=bg.getContext('2d');
  c.fillStyle='#111D35';c.fillRect(0,0,W,H);
  c.strokeStyle='#0D1828';c.lineWidth=1;
  for(let x=0;x<=W;x+=8){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(let y=0;y<=H;y+=8){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
  for(let tx=0;tx<W/8;tx++)for(let ty=0;ty<H/8;ty++)
    if(Math.random()<0.04){c.fillStyle='#0A1220';c.fillRect(tx*8+1,ty*8+1,6,6);}
  return bg;
}

// ── CRT ───────────────────────────────────────────────────────────────────────
function drawCRT(ctx,cw,ch){
  for(let y=0;y<ch;y+=4){ctx.fillStyle='rgba(0,0,0,0.13)';ctx.fillRect(0,y,cw,2);}
  const g=ctx.createRadialGradient(cw/2,ch/2,ch*0.25,cw/2,ch/2,ch*0.72);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch);
}

// ── Aim line ──────────────────────────────────────────────────────────────────
function drawAimLine(ctx,player,mouse){
  const tipX=player.x+Math.cos(player.angle)*14,tipY=player.y+Math.sin(player.angle)*14;
  const wc=WEAPONS[player.weapon].col;
  ctx.save();ctx.globalAlpha=0.3;ctx.strokeStyle=wc;ctx.lineWidth=0.5;
  ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(tipX,tipY);ctx.lineTo(mouse.x,mouse.y);ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=0.55;ctx.fillStyle=PAL.RED;
  ctx.fillRect(Math.round(mouse.x)-1,Math.round(mouse.y)-1,3,3);ctx.restore();
}

// ── Crosshair ─────────────────────────────────────────────────────────────────
function drawCrosshair(ctx,mx,my,weapon){
  const col=WEAPONS[weapon]?.col||PAL.WHITE;
  ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=0.5;
  const s=5;
  ctx.beginPath();ctx.moveTo(mx-s-2,my);ctx.lineTo(mx-2,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx+2,my);ctx.lineTo(mx+s+2,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx,my-s-2);ctx.lineTo(mx,my-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx,my+2);ctx.lineTo(mx,my+s+2);ctx.stroke();
  ctx.strokeStyle=col;ctx.beginPath();ctx.arc(mx,my,2,0,Math.PI*2);ctx.stroke();
}

    });
  }
  if(g.combo>1){

  }
  const rem=g.enemies.length+g.level.spawnQueue.length;
  ctx.font='10px monospace';ctx.fillStyle=PAL.GREY;ctx.fillText('ENEMIES: '+rem,4,CH-16);
  ctx.textAlign='right';ctx.fillText('KILLS: '+g.kills,CW-4,CH-16);ctx.textAlign='left';

  }
}

// ── Virtual controls (mobile) ─────────────────────────────────────────────────
function drawVirtualControls(ctx,g){
  const input=g.input;
  if(!input||!input.isMobile)return;
  // Portrait warning
  if(window.innerHeight>window.innerWidth*1.2){
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 26px monospace';ctx.fillStyle=PAL.YELLOW;
    ctx.fillText('ROTATE DEVICE',CW/2,CH/2-18);
    ctx.font='14px monospace';ctx.fillStyle=PAL.WHITE;
    ctx.fillText('landscape for best play',CW/2,CH/2+18);
    ctx.textAlign='left';ctx.textBaseline='top';return;
  }
  const s=input._scale;
  const maxR=CW*JOY_R; // max throw in canvas coords

  // ── Draw one joystick ────────────────────────────────────────────────────────
  function drawJoystick(joy, defX, defY, ringCol, label, isFireJoy){
    const baseX=joy.active?(joy.baseCSS.x/s):defX;
    const baseY=joy.active?(joy.baseCSS.y/s):defY;
    const rawKX=joy.active?(joy.knobCSS.x/s):baseX;
    const rawKY=joy.active?(joy.knobCSS.y/s):baseY;
    const dkx=rawKX-baseX,dky=rawKY-baseY;
    const dkd=Math.sqrt(dkx*dkx+dky*dky);
    const knobX=dkd>maxR?baseX+dkx/dkd*maxR:rawKX;
    const knobY=dkd>maxR?baseY+dky/dkd*maxR:rawKY;
    const active=joy.active;
    const firing=isFireJoy&&input.isFiring;

    // Soft glow behind base
    ctx.globalAlpha=0.1;
    ctx.fillStyle=ringCol;
    ctx.beginPath();ctx.arc(baseX,baseY,maxR+22,0,Math.PI*2);ctx.fill();

    // Base plate (dark fill + colored ring)
    ctx.globalAlpha=active?0.45:0.28;
    ctx.fillStyle='#0a0a18';
    ctx.beginPath();ctx.arc(baseX,baseY,maxR+10,0,Math.PI*2);ctx.fill();

    ctx.globalAlpha=active?0.85:0.45;
    ctx.strokeStyle=firing?PAL.RED:ringCol;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(baseX,baseY,maxR+10,0,Math.PI*2);ctx.stroke();

    // Inner ring guide
    ctx.globalAlpha=0.18;
    ctx.strokeStyle=ringCol;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(baseX,baseY,maxR*0.5,0,Math.PI*2);ctx.stroke();

    // Direction line when active
    if(active&&dkd>5){
      ctx.globalAlpha=0.4;
      ctx.strokeStyle=ringCol;ctx.lineWidth=1.5;
      ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(baseX,baseY);ctx.lineTo(knobX,knobY);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Knob shadow
    ctx.globalAlpha=0.4;
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(knobX+1.5,knobY+1.5,20,0,Math.PI*2);ctx.fill();

    // Knob body
    ctx.globalAlpha=active?0.95:0.65;
    ctx.fillStyle=firing?PAL.RED:ringCol;
    ctx.beginPath();ctx.arc(knobX,knobY,20,0,Math.PI*2);ctx.fill();

    // Knob highlight
    ctx.globalAlpha=0.35;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(knobX-5,knobY-5,9,0,Math.PI*2);ctx.fill();

    // Knob label
    ctx.globalAlpha=active?1:0.6;
    ctx.fillStyle=PAL.WHITE;
    ctx.font='bold 8px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,knobX,knobY);

    ctx.globalAlpha=1;ctx.textAlign='left';ctx.textBaseline='top';
  }

  // Left joystick — movement (bottom-left)
  drawJoystick(input.joystick, CW*0.13, CH*0.80, PAL.CYAN, 'MOVE', false);
  // Right joystick — aim + fire (bottom-right)
  drawJoystick(input.rightJoy, CW*0.87, CH*0.80, PAL.ORANGE, input.isFiring?'FIRE':'AIM', true);

  // ── Weapon buttons (bottom-center strip) ────────────────────────────────────
  const slots=Object.keys(WEAPONS);
  const btnW=38,gap=3,totalW=slots.length*(btnW+gap)-gap;
  const startX=(CW-totalW)/2,startY=CH-36,btnH=30,r2=4;

  slots.forEach((sw,i)=>{
    const has=sw==='pistol'||(g.player&&g.player.ammo[sw]>0);
    const active=g.player&&g.player.weapon===sw;
    const wdef=WEAPONS[sw];
    const bx=startX+i*(btnW+gap),by=startY;

    // Button bg
    ctx.globalAlpha=active?0.88:(has?0.38:0.12);
    ctx.fillStyle=active?wdef.col:(has?'#1a1a2e':'#0a0a0a');
    ctx.beginPath();
    ctx.moveTo(bx+r2,by);ctx.lineTo(bx+btnW-r2,by);ctx.arcTo(bx+btnW,by,bx+btnW,by+r2,r2);
    ctx.lineTo(bx+btnW,by+btnH-r2);ctx.arcTo(bx+btnW,by+btnH,bx+btnW-r2,by+btnH,r2);
    ctx.lineTo(bx+r2,by+btnH);ctx.arcTo(bx,by+btnH,bx,by+btnH-r2,r2);
    ctx.lineTo(bx,by+r2);ctx.arcTo(bx,by,bx+r2,by,r2);ctx.closePath();ctx.fill();

    // Border
    ctx.globalAlpha=active?1:(has?0.55:0.18);
    ctx.strokeStyle=active?'#fff':(has?wdef.col:PAL.DARKGREY);
    ctx.lineWidth=active?1.5:0.75;
    ctx.beginPath();
    ctx.moveTo(bx+r2,by);ctx.lineTo(bx+btnW-r2,by);ctx.arcTo(bx+btnW,by,bx+btnW,by+r2,r2);
    ctx.lineTo(bx+btnW,by+btnH-r2);ctx.arcTo(bx+btnW,by+btnH,bx+btnW-r2,by+btnH,r2);
    ctx.lineTo(bx+r2,by+btnH);ctx.arcTo(bx,by+btnH,bx,by+btnH-r2,r2);
    ctx.lineTo(bx,by+r2);ctx.arcTo(bx,by,bx+r2,by,r2);ctx.closePath();ctx.stroke();

    // Number key
    ctx.globalAlpha=active?0.6:(has?0.4:0.15);
    ctx.fillStyle=active?PAL.BLACK:PAL.GREY;
    ctx.font='6px monospace';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(i+1,bx+2,by+2);

    // Weapon name
    ctx.globalAlpha=active?1:(has?0.8:0.2);
    ctx.fillStyle=active?PAL.BLACK:wdef.col;
    ctx.font=(active?'bold ':'')+7+'px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(sw.slice(0,4).toUpperCase(),bx+btnW/2,by+btnH*0.42);

    // Ammo count
    if(sw!=='pistol'&&has&&g.player){
      ctx.globalAlpha=active?0.75:0.55;
      ctx.fillStyle=active?PAL.BLACK:PAL.WHITE;
      ctx.font='6px monospace';
      ctx.fillText(g.player.ammo[sw],bx+btnW/2,by+btnH*0.78);
    }

    ctx.globalAlpha=1;ctx.textAlign='left';ctx.textBaseline='top';
  });
}

// ── Game ──────────────────────────────────────────────────────────────────────
let game;
class Game {
  constructor(){
    this.canvas=document.getElementById('game');
    this.ctx=this.canvas.getContext('2d');
    this.state='START';this.last=0;this.accum=0;this.STEP=1000/60;
    this._dpr=1;this._cssScale=1;this._ready=false;
    this.input=new InputHandler(this.canvas);
    this._setupScale();
    this._ready=true;
    window.addEventListener('resize',()=>this._setupScale());
    this.bg=buildBackground();this.audio=null;
    this.highScore=parseInt(localStorage.getItem('retro_assault_hi')||'0');
    this._initGame();
  }
  _setupScale(){
    const dpr=window.devicePixelRatio||1;
    const s=Math.min(window.innerWidth/CW,window.innerHeight/CH);
    const dispW=Math.floor(CW*s),dispH=Math.floor(CH*s);
    // Canvas buffer = display size × DPR for Retina/HiDPI sharpness
    this.canvas.width=dispW*dpr;
    this.canvas.height=dispH*dpr;
    this.canvas.style.width=dispW+'px';
    this.canvas.style.height=dispH+'px';
    this._dpr=dpr;
    this._cssScale=s;
    this.ctx.imageSmoothingEnabled=false;
    // Rebuild background at new resolution
    if(this._ready)this.bg=buildBackground();
    if(this.input)this.input._scale=s;
  }
  _initGame(){
    this.player=new Player(W/2,H/2);
    this.bullets=[];this.enemies=[];this.particles=[];this.pickups=[];
    this.score=0;this.kills=0;this.bonusTimer=0;
    this.combo=1;this.comboTimer=0;
    this.level=new LevelManager(this);this.level.loadLevel(1);
  }
  _initAudio(){
    if(!this.audio)this.audio=new RetroAudio();
    try{if(this.audio.ctx&&this.audio.ctx.state==='suspended')this.audio.ctx.resume();}catch(e){}
  }
  start(){requestAnimationFrame(ts=>this.loop(ts));}
  loop(ts){
    const dt=Math.min(ts-this.last,50);this.last=ts;this.accum+=dt;
    while(this.accum>=this.STEP){this.update(this.STEP/1000);this.accum-=this.STEP;}
    this.render();requestAnimationFrame(ts2=>this.loop(ts2));
  }
  update(dt){
    switch(this.state){
      case 'START':
        if(this.input.consumeAnyKey()){this._initAudio();this.state='PLAYING';}
        break;
      case 'PLAYING':
        this.player.update(dt,this.input,this.bullets,this.particles,this);
        this.level.update(dt);
        if(this.combo>1){this.comboTimer-=dt;if(this.comboTimer<=0)this.combo=1;}
        for(const e of this.enemies){
          if(e instanceof ShooterEnemy)e.update(dt,this.player,this.bullets);
          else if(e instanceof Boss1)e.update(dt,this.player,this.bullets);
          else if(e instanceof Boss2)e.update(dt,this.player,this.bullets,this.enemies);
          else if(e instanceof Boss3)e.update(dt,this.player,this.bullets);
          else if(e instanceof Boss4)e.update(dt,this.player,this.bullets,this.enemies);
          else if(e instanceof Boss5)e.update(dt,this.player,this.bullets,this.enemies);
          else if(e instanceof Boss6)e.update(dt,this.player,this.bullets,this.enemies);
          else e.update(dt,this.player);
        }
        for(const b of this.bullets)b.update(dt);
        for(const p of this.particles)p.update(dt);
        for(const pk of this.pickups)pk.update(dt);
        // player bullets → enemies
        for(const b of this.bullets){
          if(b.dead||b.owner!=='player')continue;
          for(const e of this.enemies){
            if(e.dead)continue;
            if(b.piercing&&b.hitEnemies.has(e))continue;
            const hit=rectsOverlap(b.x-1,b.y-1,3,3,e.x-e.w/2,e.y-e.h/2,e.w,e.h);
            if(hit){
              if(!b.piercing)b.dead=true;
              else b.hitEnemies.add(e);
              e.takeDamage(b.damage);
              if(b.freezing&&!e.isBoss){e.frozen=b.freezeDuration;e.slowFactor=0.3;}
              spawnHit(this.particles,b.x,b.y,PAL.ORANGE);
              if(this.audio)this.audio.hit();
              if(e.dead)this._onEnemyDied(e);
              if(b.explosive&&b.dead){
                spawnBlast(this.particles,b.x,b.y);
                if(this.audio)this.audio.explosion();
                for(const e2 of this.enemies){
                  if(e2.dead)continue;
                  if(circlehit(b.x,b.y,e2.x,e2.y,b.blastR)){
                    e2.takeDamage(b.damage);if(e2.dead)this._onEnemyDied(e2);
                  }
                }
              }
            }
          }
        }
        // rocket explosions on walls
        for(const b of this.bullets){
          if(b.dead&&b.explosive){
            spawnBlast(this.particles,b.x,b.y);
            for(const e of this.enemies){
              if(!e.dead&&circlehit(b.x,b.y,e.x,e.y,b.blastR)){
                e.takeDamage(b.damage);if(e.dead)this._onEnemyDied(e);
              }
            }
          }
        }
        // enemy/bullet → player
        if(this.player.invincible<=0){
          for(const e of this.enemies){
            if(e.dead)continue;
            if(rectsOverlap(this.player.x-5,this.player.y-6,10,12,e.x-e.w/2,e.y-e.h/2,e.w,e.h)){
              if(this.player.takeDamage()){spawnExp(this.particles,this.player.x,this.player.y,PAL.RED,8);if(this.audio)this.audio.playerHit();}
            }
          }
          for(const b of this.bullets){
            if(b.dead||b.owner!=='enemy')continue;
            if(rectsOverlap(b.x-1,b.y-1,3,3,this.player.x-5,this.player.y-6,10,12)){
              b.dead=true;
              if(this.player.takeDamage()){spawnExp(this.particles,this.player.x,this.player.y,PAL.RED,8);if(this.audio)this.audio.playerHit();}
            }
          }
        }
        for(const pk of this.pickups){
          if(pk.dead)continue;
          if(circlehit(this.player.x,this.player.y,pk.x,pk.y,pk.r+5)){
            pk.dead=true;this._applyPickup(pk.type);if(this.audio)this.audio.pickup();
          }
        }
        if(this.player.hp<=0){
          if(this.score>this.highScore){this.highScore=this.score;localStorage.setItem('retro_assault_hi',this.highScore);}
          this.state='GAME_OVER';if(this.audio)this.audio.gameOver();
        }
        this.bullets=this.bullets.filter(b=>!b.dead);
        this.enemies=this.enemies.filter(e=>!e.dead);
        this.particles=this.particles.filter(p=>!p.dead).slice(-250);
        this.pickups=this.pickups.filter(pk=>!pk.dead);
        break;
      case 'LEVEL_COMPLETE':
        if(this.bonusTimer>0){this.bonusTimer-=dt;if(this.bonusTimer<=0)this.score+=this.level.currentLevel*500;}
        if(this.input.consumeAnyKey()){this.level.nextLevel();}
        break;
      case 'GAME_OVER':
      case 'VICTORY':
        if(this.input.isDown('KeyR')||(this.input.isMobile&&this.input.consumeAnyKey())){
          if(this.score>this.highScore){this.highScore=this.score;localStorage.setItem('retro_assault_hi',this.highScore);}
          this._initGame();this.state='PLAYING';
        }
        break;
    }
  }
  _onEnemyDied(e){
    this.combo=Math.min(this.combo+1,8);this.comboTimer=3;
    this.score+=e.scoreValue*this.combo;this.kills++;
    if(this.level.isBonus)this.level.bonusKills++;
    const col=e.isBoss?PAL.YELLOW:
      e instanceof TankEnemy?PAL.BROWN:e instanceof FastEnemy?PAL.CYAN:
      e instanceof ShooterEnemy?PAL.PURPLE:PAL.RED;
    spawnExp(this.particles,e.x,e.y,col,e.isBoss?30:12);
    if(this.audio)this.audio.die();
    const r=Math.random();
    if(e.dropChance&&r<e.dropChance){
      let type;
      if(e.dropType){type=e.dropType;}
      else{
        const roll=Math.random();
        if(roll<0.25)type='heart';
        else if(roll<0.45)type='shield';
        else if(roll<0.6)type='speed';
        else if(roll<0.7)type='ammo';
        else if(e instanceof TankEnemy)type='weapon_shotgun';
        else if(e instanceof FastEnemy)type='weapon_smg';
        else if(e instanceof ShooterEnemy)type='weapon_laser';
        else type='heart';
      }
      this.pickups.push(new Pickup(e.x,e.y,type));
    }
  }
  _applyPickup(type){
    const p=this.player;
    if(type==='heart'){p.hp=Math.min(p.hp+1,p.maxHp);}
    else if(type==='shield'){p.shield=4;}
    else if(type==='speed'){p.speedBoost=5;}
    else if(type==='ammo'){if(p.weapon!=='pistol')p.ammo[p.weapon]+=10;}
    else if(type.startsWith('weapon_')){p.pickupWeapon(type);}
  }
  render(){
    const ctx=this.ctx;
    // Apply DPR + CSS scale so all drawing uses CW/CH logical coords
    const dpr=this._dpr||1,s=this._cssScale||1;
    ctx.setTransform(dpr*s,0,0,dpr*s,0,0);
    ctx.imageSmoothingEnabled=false;
    const playing=this.state==='PLAYING'||this.state==='LEVEL_COMPLETE'||
                  this.state==='GAME_OVER'||this.state==='VICTORY';
    ctx.save();ctx.scale(2,2);
    ctx.drawImage(this.bg,0,0);
    if(playing){
      drawAimLine(ctx,this.player,this.input.mouse);
      for(const b of this.bullets)b.draw(ctx);
      for(const p of this.particles)p.draw(ctx);
      for(const pk of this.pickups)pk.draw(ctx);
      for(const e of this.enemies)e.draw(ctx);
      // freeze overlay
      for(const e of this.enemies){
        if(e.frozen>0&&e.hitFlash<=0){
          ctx.globalAlpha=0.35;ctx.fillStyle='#C8F4FF';
          ctx.fillRect(Math.round(e.x)-e.w/2,Math.round(e.y)-e.h/2,e.w,e.h);
          ctx.globalAlpha=1;
        }
      }
      this.player.draw(ctx);
      drawCrosshair(ctx,Math.round(this.input.mouse.x),Math.round(this.input.mouse.y),this.player.weapon);
    }
    ctx.restore();
    if(playing){drawCRT(ctx,CW,CH);drawHUD(ctx,this);}
    if(this.state==='START'){drawCRT(ctx,CW,CH);drawStartScreen(ctx,this);}
    if(this.state==='LEVEL_COMPLETE')drawLevelComplete(ctx,this);
    if(this.state==='GAME_OVER')drawGameOver(ctx,this);
    if(this.state==='VICTORY')drawVictory(ctx,this);
    if(playing||this.state==='START')drawVirtualControls(ctx,this);
  }
}

game=new Game();
game.start();
</script>
