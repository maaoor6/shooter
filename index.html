<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RETRO ASSAULT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body { display: flex; align-items: center; justify-content: center; }
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: none;
      touch-action: none;
    }
    #muteBtn {
      position: fixed; top: 10px; right: 10px; z-index: 100;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 18px; width: 36px; height: 36px;
      border-radius: 8px; cursor: pointer; line-height: 1;
      transition: background 0.15s;
    }
    #muteBtn:hover { background: rgba(255,255,255,0.15); }
    #nameInput {
      display: none; position: fixed; z-index: 200;
      left: 50%; top: 50%; transform: translate(-50%, 8px);
      background: #111133; border: 2px solid #00CCFF; color: #fff;
      font-size: 28px; font-family: monospace; text-align: center;
      width: 120px; padding: 6px; letter-spacing: 8px;
      text-transform: uppercase; border-radius: 4px; outline: none;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<button id="muteBtn" title="Toggle sound">🔊</button>
<input id="nameInput" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="text">
<script>
'use strict';
const W = 320, H = 240, CW = 640, CH = 480;

const PAL = {
  BLACK:'#000000',DARKBLUE:'#1D2B53',PURPLE:'#7E2553',DARKGRN:'#008751',
  BROWN:'#AB5236',DARKGREY:'#5F574F',GREY:'#C2C3C7',WHITE:'#FFF1E8',
  RED:'#FF004D',ORANGE:'#FFA300',YELLOW:'#FFEC27',GREEN:'#00E436',
  CYAN:'#29ADFF',LAVENDER:'#83769C',PINK:'#FF77A8',PEACH:'#FFCCAA'
};

const WEAPONS = {
  pistol:  {name:'PISTOL',  rate:0.22, dmg:1,   count:1, spread:0,    spd:260, col:PAL.YELLOW,   ammo:-1},
  shotgun: {name:'SHOTGUN', rate:0.65, dmg:1,   count:5, spread:0.25, spd:200, col:PAL.ORANGE,   ammo:12},
  smg:     {name:'SMG',     rate:0.07, dmg:1,   count:1, spread:0.1,  spd:300, col:PAL.CYAN,     ammo:40},
  rocket:  {name:'ROCKET',  rate:1.2,  dmg:5,   count:1, spread:0,    spd:140, col:PAL.RED,      ammo:6,  explosive:true, blastR:20},
  laser:   {name:'LASER',   rate:0.12, dmg:2,   count:1, spread:0,    spd:420, col:PAL.GREEN,    ammo:25, piercing:true},
  plasma:  {name:'PLASMA',  rate:1.6,  dmg:12,  count:1, spread:0,    spd:80,  col:PAL.LAVENDER, ammo:4,  bouncing:true, maxBounces:3},
  freeze:  {name:'FREEZE',  rate:0.18, dmg:1,   count:1, spread:0.05, spd:280, col:'#C8F4FF',    ammo:30, freezing:true, freezeDuration:2.0},
  flame:   {name:'FLAME',   rate:0.04, dmg:0.5, count:3, spread:0.35, spd:140, col:PAL.ORANGE,   ammo:80, flame:true, range:80},
};

function rand(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(rand(a,b+0.999));}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function circlehit(ax,ay,bx,by,r){
  const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy<r*r;
}
function hexToRgb(hex){
  // Returns "r,g,b" string from #RRGGBB or named color fallback
  const m=String(hex).match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
  return m?parseInt(m[1],16)+','+parseInt(m[2],16)+','+parseInt(m[3],16):'200,200,200';
}

// ── Input ─────────────────────────────────────────────────────────────────────
// Joy max throw as fraction of canvas display width (shared by input & draw)
const JOY_R = 0.075; // throw radius as fraction of CW

class InputHandler {
  constructor(canvas) {
    this.keys=new Set(); this.mouse={x:W/2,y:H/2};
    this.clicks=[]; this.anyKey=false; this._scale=1;
    this.isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
    // Left joystick: movement
    this.joystick={active:false,baseCSS:{x:0,y:0},knobCSS:{x:0,y:0},id:null};
    // Right joystick: aim + fire
    this.rightJoy={active:false,baseCSS:{x:0,y:0},knobCSS:{x:0,y:0},id:null,angle:0,magnitude:0};
    this.pendingWeaponSwitch=null;

    window.addEventListener('keydown',e=>{
      // Don't capture keys while player is typing their name
      if(typeof game!=='undefined'&&game.state==='NAME_INPUT')return;
      this.keys.add(e.code); this.anyKey=true;
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
    });
    window.addEventListener('keyup',e=>this.keys.delete(e.code));
    canvas.addEventListener('mousemove',e=>{
      const r=canvas.getBoundingClientRect();
      this.mouse.x=(e.clientX-r.left)/this._scale/2;
      this.mouse.y=(e.clientY-r.top)/this._scale/2;
    });
    canvas.addEventListener('mousedown',e=>{
      if(e.button===0){
        const r=canvas.getBoundingClientRect();
        const cx=(e.clientX-r.left)/this._scale,cy=(e.clientY-r.top)/this._scale;
        // Don't fire weapon when clicking a weapon button
        if(!this._checkWeaponButtons(cx,cy)){
          this.clicks.push({x:cx/2,y:cy/2});
        }
        this.anyKey=true;
      }
    });
    canvas.addEventListener('touchstart',e=>{e.preventDefault();this._onTouchStart(e,canvas);},{passive:false});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();this._onTouchMove(e,canvas);},{passive:false});
    canvas.addEventListener('touchend',e=>{e.preventDefault();this._onTouchEnd(e);},{passive:false});
    canvas.addEventListener('touchcancel',e=>{e.preventDefault();this._onTouchEnd(e);},{passive:false});
    // Mouse wheel: cycle weapons with wrap-around
    canvas.addEventListener('wheel',e=>{
      e.preventDefault();
      if(typeof game==='undefined'||game.state!=='PLAYING')return;
      const slots=Object.keys(WEAPONS);
      const cur=slots.indexOf(game.player.weapon);
      const next=e.deltaY>0?(cur+1)%slots.length:(cur-1+slots.length)%slots.length;
      this.pendingWeaponSwitch=slots[next];
    },{passive:false});
  }
  // Fire whenever right joystick is deflected past 15%
  get isFiring(){return this.rightJoy.active&&this.rightJoy.magnitude>0.15;}
  _pos(touch,canvas){
    // Canvas is fixed at top-left of screen, so no getBoundingClientRect offset needed
    // but we use it for future-proofness
    const r=canvas.getBoundingClientRect();
    const cssX=touch.clientX-r.left,cssY=touch.clientY-r.top;
    return {cssX,cssY,
      // canvasX/Y = logical canvas coords (0..CW in x, 0.._vch in y)
      canvasX:cssX/this._scale, canvasY:cssY/this._scale,
      gameX:cssX/this._scale/2, gameY:cssY/this._scale/2,
      cw:r.width,ch:r.height};
  }
  _onTouchStart(e,canvas){
    this.anyKey=true; this.isMobile=true;
    for(const t of e.changedTouches){
      const p=this._pos(t,canvas);
      // Weapon buttons hit test — only when actively playing
      if(game&&['PLAYING','LEVEL_COMPLETE'].includes(game.state)&&this._checkWeaponButtons(p.canvasX,p.canvasY))continue;
      if(p.cssX<p.cw*0.5&&!this.joystick.active){
        // Left half → movement joystick
        this.joystick.active=true;this.joystick.id=t.identifier;
        this.joystick.baseCSS={x:p.cssX,y:p.cssY};
        this.joystick.knobCSS={x:p.cssX,y:p.cssY};
      } else if(p.cssX>=p.cw*0.5&&!this.rightJoy.active){
        // Right half → aim joystick
        this.rightJoy.active=true;this.rightJoy.id=t.identifier;
        this.rightJoy.baseCSS={x:p.cssX,y:p.cssY};
        this.rightJoy.knobCSS={x:p.cssX,y:p.cssY};
        this.rightJoy.magnitude=0;
        // Click for menu/any-key detection
        this.clicks.push({x:p.gameX,y:p.gameY});
      }
    }
  }
  _onTouchMove(e,canvas){
    for(const t of e.changedTouches){
      const p=this._pos(t,canvas);
      if(t.identifier===this.joystick.id){
        this.joystick.knobCSS={x:p.cssX,y:p.cssY};
        const dx=p.cssX-this.joystick.baseCSS.x,dy=p.cssY-this.joystick.baseCSS.y;
        const mag=Math.sqrt(dx*dx+dy*dy),maxT=p.cw*JOY_R;
        if(mag>6){
          const nx=dx/Math.max(mag,maxT),ny=dy/Math.max(mag,maxT);
          if(nx<-0.28)this.keys.add('KeyA');else this.keys.delete('KeyA');
          if(nx>0.28) this.keys.add('KeyD');else this.keys.delete('KeyD');
          if(ny<-0.28)this.keys.add('KeyW');else this.keys.delete('KeyW');
          if(ny>0.28) this.keys.add('KeyS');else this.keys.delete('KeyS');
        } else {['KeyA','KeyD','KeyW','KeyS'].forEach(k=>this.keys.delete(k));}
      } else if(t.identifier===this.rightJoy.id){
        this.rightJoy.knobCSS={x:p.cssX,y:p.cssY};
        const dx=p.cssX-this.rightJoy.baseCSS.x,dy=p.cssY-this.rightJoy.baseCSS.y;
        const mag=Math.sqrt(dx*dx+dy*dy),maxT=p.cw*JOY_R;
        this.rightJoy.magnitude=Math.min(mag/maxT,1);
        if(mag>5)this.rightJoy.angle=Math.atan2(dy,dx);
      }
    }
  }
  _onTouchEnd(e){
    for(const t of e.changedTouches){
      if(t.identifier===this.joystick.id){
        this.joystick.active=false;this.joystick.id=null;
        ['KeyA','KeyD','KeyW','KeyS'].forEach(k=>this.keys.delete(k));
      } else if(t.identifier===this.rightJoy.id){
        this.rightJoy.active=false;this.rightJoy.id=null;this.rightJoy.magnitude=0;
      }
    }
  }
  _checkWeaponButtons(hx,hy){
    // hx,hy in logical canvas coords (0..CW in x; 0.._vch in y)
    const slots=Object.keys(WEAPONS);
    const btnW=38,gap=3,totalW=slots.length*(btnW+gap)-gap;
    const startX=(CW-totalW)/2;
    // Portrait: buttons live in the controls zone below game area
    // Landscape: buttons at bottom of game area
    const vch=this._vch||CH;
    const startY=this._portrait?(CH+(vch-CH)*0.72):(CH-38);
    const btnH=this._portrait?34:30;
    for(let i=0;i<slots.length;i++){
      const bx=startX+i*(btnW+gap);
      if(hx>=bx&&hx<=bx+btnW&&hy>=startY&&hy<=startY+btnH){
        this.pendingWeaponSwitch=slots[i];return true;
      }
    }
    return false;
  }
  isDown(c){return this.keys.has(c);}
  consumeClicks(){const c=this.clicks.slice();this.clicks=[];return c;}
  consumeAnyKey(){const v=this.anyKey;this.anyKey=false;return v;}
}

// ── Particle ──────────────────────────────────────────────────────────────────
class Particle {
  constructor(x,y,vx,vy,color,life,size=2){
    Object.assign(this,{x,y,vx,vy,color,life,maxLife:life,size,dead:false});
  }
  update(dt){
    this.x+=this.vx*dt; this.y+=this.vy*dt; this.vy+=60*dt;
    this.life-=dt; if(this.life<=0)this.dead=true;
  }
  draw(ctx){
    ctx.globalAlpha=this.life/this.maxLife;
    ctx.fillStyle=this.color;
    ctx.fillRect(Math.round(this.x-this.size/2),Math.round(this.y-this.size/2),this.size,this.size);
    ctx.globalAlpha=1;
  }
}
function spawnExp(p,x,y,col,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=rand(20,90);
    p.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s-20,col,rand(0.3,0.6),randInt(1,3)));
  }
}
function spawnBlast(p,x,y){
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2,s=rand(30,120);
    p.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,PAL.ORANGE,rand(0.2,0.5),randInt(2,4)));
    p.push(new Particle(x,y,Math.cos(a)*s*0.5,Math.sin(a)*s*0.5,PAL.YELLOW,rand(0.3,0.6),2));
  }
}
function spawnHit(p,x,y,col){
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2;
    p.push(new Particle(x,y,Math.cos(a)*rand(30,60),Math.sin(a)*rand(30,60),col,0.2,1));
  }
}
function spawnMuzzle(p,x,y,angle){
  for(let i=0;i<4;i++){
    const a=angle+rand(-0.4,0.4);
    p.push(new Particle(x,y,Math.cos(a)*rand(40,80),Math.sin(a)*rand(40,80),PAL.YELLOW,0.08,2));
  }
}

// ── Bullet ────────────────────────────────────────────────────────────────────
class Bullet {
  constructor(x,y,angle,owner){
    this.x=x;this.y=y;this.angle=angle;this.owner=owner;
    this.speed=260;this.damage=1;this.dead=false;
    this.color=PAL.YELLOW;this.trail=[];
    this.explosive=false;this.blastR=0;this.piercing=false;
    this.hitEnemies=new Set();
    this.bouncing=false;this.bounces=0;this.vx=0;this.vy=0;
    this.freezing=false;this.freezeDuration=0;
    this.flame=false;this.range=0;this.distTravelled=0;
  }
  update(dt){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>5)this.trail.shift();
    if(this.bouncing){
      this.x+=this.vx*dt;this.y+=this.vy*dt;
      let bounced=false;
      if(this.x<=0){this.vx=Math.abs(this.vx);this.x=1;bounced=true;}
      else if(this.x>=W){this.vx=-Math.abs(this.vx);this.x=W-1;bounced=true;}
      if(this.y<=0){this.vy=Math.abs(this.vy);this.y=1;bounced=true;}
      else if(this.y>=H){this.vy=-Math.abs(this.vy);this.y=H-1;bounced=true;}
      if(bounced){this.bounces--;if(this.bounces<0)this.dead=true;}
    } else if(this.flame){
      this.x+=Math.cos(this.angle)*this.speed*dt;
      this.y+=Math.sin(this.angle)*this.speed*dt;
      this.distTravelled+=this.speed*dt;
      if(this.distTravelled>=this.range)this.dead=true;
    } else {
      this.x+=Math.cos(this.angle)*this.speed*dt;
      this.y+=Math.sin(this.angle)*this.speed*dt;
      if(this.x<-10||this.x>W+10||this.y<-10||this.y>H+10)this.dead=true;
    }
  }
  draw(ctx){
    const isP=this.owner==='player';
    const trailCol=this.flame?PAL.YELLOW:(isP?PAL.ORANGE:PAL.PINK);
    for(let i=0;i<this.trail.length;i++){
      ctx.globalAlpha=(i+1)/(this.trail.length+1)*0.6;
      ctx.fillStyle=trailCol;
      ctx.fillRect(Math.round(this.trail[i].x)-1,Math.round(this.trail[i].y)-1,2,2);
    }
    ctx.globalAlpha=1;
    if(this.bouncing){
      ctx.globalAlpha=0.3;ctx.fillStyle=PAL.LAVENDER;
      ctx.fillRect(Math.round(this.x)-4,Math.round(this.y)-4,8,8);
      ctx.globalAlpha=1;
      ctx.fillStyle=PAL.LAVENDER;ctx.fillRect(Math.round(this.x)-2,Math.round(this.y)-2,4,4);
      ctx.fillStyle=PAL.WHITE;ctx.fillRect(Math.round(this.x)-1,Math.round(this.y)-1,2,2);
    } else {
      const sz=this.explosive?3:2;
      ctx.fillStyle=this.explosive?PAL.RED:(this.piercing?PAL.GREEN:PAL.WHITE);
      ctx.fillRect(Math.round(this.x)-Math.floor(sz/2),Math.round(this.y)-Math.floor(sz/2),sz,sz);
      let col=this.color;
      if(this.flame){
        const t=this.range>0?this.distTravelled/this.range:0;
        col=t<0.3?PAL.YELLOW:t<0.6?PAL.ORANGE:PAL.RED;
      }
      ctx.fillStyle=col;
      ctx.fillRect(Math.round(this.x)-1,Math.round(this.y)-1,2,2);
    }
  }
}

// ── Pickup ────────────────────────────────────────────────────────────────────
class Pickup {
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;
    this.dead=false;this.bob=0;this.lifetime=12;this.r=6;
  }
  update(dt){
    this.bob+=dt*3;this.lifetime-=dt;
    if(this.lifetime<=0)this.dead=true;
  }
  draw(ctx){
    const bx=Math.round(this.x),by=Math.round(this.y+Math.sin(this.bob)*1.5);
    const fade=this.lifetime<2?this.lifetime/2:1;
    ctx.globalAlpha=fade;
    ctx.strokeStyle=this._color();ctx.lineWidth=0.5;
    ctx.beginPath();ctx.arc(bx,by,this.r+1,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.arc(bx,by,this.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=this._color();
    this._drawIcon(ctx,bx,by);
    ctx.globalAlpha=1;
  }
  _color(){
    if(this.type==='heart')return PAL.RED;
    if(this.type==='shield')return PAL.CYAN;
    if(this.type==='speed')return PAL.GREEN;
    if(this.type==='ammo')return PAL.YELLOW;
    const w=this.type.replace('weapon_','');
    return WEAPONS[w]?WEAPONS[w].col:PAL.GREY;
  }
  _drawIcon(ctx,x,y){
    const t=this.type;
    ctx.fillStyle=this._color();
    if(t==='heart'){
      ctx.fillRect(x-3,y+1,2,2);ctx.fillRect(x,y+1,2,2);
      ctx.fillRect(x-3,y-1,2,1);ctx.fillRect(x,y-1,2,1);
      ctx.fillRect(x-3,y+3,5,1);ctx.fillRect(x-2,y+4,3,1);ctx.fillRect(x-1,y+5,1,1);
    } else if(t==='shield'){
      ctx.fillRect(x-3,y-3,6,5);ctx.fillRect(x-2,y+2,4,1);ctx.fillRect(x-1,y+3,2,1);
    } else if(t==='speed'){
      ctx.fillRect(x-4,y-1,5,2);ctx.fillRect(x-2,y-3,3,2);ctx.fillRect(x-2,y+1,3,2);
    } else if(t==='ammo'){
      ctx.fillRect(x-3,y-3,2,6);ctx.fillRect(x,y-3,2,6);ctx.fillRect(x-2,y-4,5,1);
    } else {
      ctx.fillRect(x-4,y-1,7,2);ctx.fillRect(x-2,y-2,3,1);
    }
  }
}

// ── Player ────────────────────────────────────────────────────────────────────
class Player {
  constructor(x,y){
    this.x=x;this.y=y;this.w=10;this.h=12;
    this.speed=70;this.hp=3;this.maxHp=5;
    this.angle=0;this.shootCooldown=0;
    this.animFrame=0;this.animTimer=0;this.facing=1;this.invincible=0;
    this.weapon='pistol';this._prevWeapon='pistol';this._weaponFlash=0;
    this.ammo={shotgun:12,smg:40,rocket:6,laser:25,plasma:4,freeze:30,flame:80};
    this.shield=0;this.speedBoost=0;
  }
  update(dt,input,bullets,particles,game){
    let dx=0,dy=0;
    if(input.isDown('KeyA')||input.isDown('ArrowLeft'))dx-=1;
    if(input.isDown('KeyD')||input.isDown('ArrowRight'))dx+=1;
    if(input.isDown('KeyW')||input.isDown('ArrowUp'))dy-=1;
    if(input.isDown('KeyS')||input.isDown('ArrowDown'))dy+=1;
    if(dx!==0&&dy!==0){dx*=0.7071;dy*=0.7071;}
    const sp=this.speed*(this.speedBoost>0?1.7:1);
    // Smooth movement: lerp current velocity toward target
    if(!this._mvx)this._mvx=0;if(!this._mvy)this._mvy=0;
    const accel=18; // higher = snappier
    this._mvx+=(dx*sp-this._mvx)*Math.min(1,accel*dt);
    this._mvy+=(dy*sp-this._mvy)*Math.min(1,accel*dt);
    if(Math.abs(this._mvx)>0.5||Math.abs(this._mvy)>0.5){
      this.x+=this._mvx*dt;this.y+=this._mvy*dt;
      if(dx!==0)this.facing=Math.sign(dx);
    }
    // Weapon switch flash
    if(this._weaponFlash>0)this._weaponFlash=Math.max(0,this._weaponFlash-dt*4);
    if(this.weapon!==this._prevWeapon){this._weaponFlash=1;this._prevWeapon=this.weapon;}
    this.animTimer+=dt;
    if(this.animTimer>=0.11){this.animTimer=0;this.animFrame^=1;}
    this.x=clamp(this.x,8,W-8);this.y=clamp(this.y,8,H-8);
    // Aim: right joystick on mobile, mouse on desktop
    if(input.isMobile&&input.rightJoy.active&&input.rightJoy.magnitude>0.1){
      this.angle=input.rightJoy.angle;
      input.mouse.x=this.x+Math.cos(this.angle)*55;
      input.mouse.y=this.y+Math.sin(this.angle)*55;
    } else if(input.isMobile){
      // Joystick released: keep crosshair projected in current aim direction so it
      // follows the player rather than floating frozen at the last touch position
      input.mouse.x=this.x+Math.cos(this.angle)*55;
      input.mouse.y=this.y+Math.sin(this.angle)*55;
    } else {
      this.angle=Math.atan2(input.mouse.y-this.y,input.mouse.x-this.x);
    }
    // Aim assist (mobile only): gently snap toward nearest enemy in cone
    if(input.isMobile&&game&&game.enemies&&game.enemies.length>0){
      const ax=Math.cos(this.angle),ay=Math.sin(this.angle);
      let bestDot=0.6,bestAngle=this.angle; // 0.6 ≈ within ~53°
      for(const e of game.enemies){
        if(e.dead)continue;
        const ex=e.x-this.x,ey=e.y-this.y;
        const dist=Math.sqrt(ex*ex+ey*ey);
        if(dist<8||dist>200)continue;
        const dot=ax*(ex/dist)+ay*(ey/dist);
        if(dot>bestDot){bestDot=dot;bestAngle=Math.atan2(ey,ex);}
      }
      if(bestAngle!==this.angle){
        let diff=bestAngle-this.angle;
        while(diff>Math.PI)diff-=Math.PI*2;
        while(diff<-Math.PI)diff+=Math.PI*2;
        this.angle+=diff*0.18; // 18% blend toward target
      }
    }
    this.shootCooldown-=dt;
    if(this.invincible>0)this.invincible-=dt;
    if(this.shield>0)this.shield-=dt;
    if(this.speedBoost>0)this.speedBoost-=dt;
    // mobile weapon switch — allow selecting any weapon (ammo check at fire time)
    if(input.pendingWeaponSwitch){
      this.weapon=input.pendingWeaponSwitch;
      input.pendingWeaponSwitch=null;
    }
    // keyboard weapon switch 1-8
    const wkeys=[['Digit1','pistol'],['Digit2','shotgun'],['Digit3','smg'],['Digit4','rocket'],['Digit5','laser'],['Digit6','plasma'],['Digit7','freeze'],['Digit8','flame']];
    for(const[k,w]of wkeys){
      if(input.isDown(k))this.weapon=w;
    }
    const clicks=input.consumeClicks();
    if((clicks.length>0||input.isFiring)&&this.shootCooldown<=0)this._shoot(bullets,particles,game);
  }
  _shoot(bullets,particles,game){
    const w=WEAPONS[this.weapon];
    const tipX=this.x+Math.cos(this.angle)*12;
    const tipY=this.y+Math.sin(this.angle)*12;
    for(let i=0;i<w.count;i++){
      const a=this.angle+(Math.random()-0.5)*w.spread*2;
      const b=new Bullet(tipX,tipY,a,'player');
      b.speed=w.spd;b.damage=w.dmg;b.color=w.col;
      b.explosive=w.explosive||false;b.blastR=w.blastR||0;b.piercing=w.piercing||false;
      b.bouncing=w.bouncing||false;
      if(w.bouncing){b.vx=Math.cos(a)*w.spd;b.vy=Math.sin(a)*w.spd;b.bounces=w.maxBounces||0;}
      b.freezing=w.freezing||false;b.freezeDuration=w.freezeDuration||0;
      b.flame=w.flame||false;b.range=w.range||0;
      bullets.push(b);
    }
    spawnMuzzle(particles,tipX,tipY,this.angle);
    this.shootCooldown=w.rate;
    if(game.audio)game.audio.shoot(this.weapon);
  }
  pickupWeapon(type){
    const w=type.replace('weapon_','');
    this.ammo[w]=(this.ammo[w]||0)+WEAPONS[w].ammo;
    this.weapon=w;
  }
  takeDamage(){
    if(this.invincible>0||this.shield>0)return false;
    this.hp--;this.invincible=1.5;return true;
  }
  draw(ctx){
    const px=Math.round(this.x),py=Math.round(this.y);
    const blink=this.invincible>0&&Math.floor(this.invincible*10)%2===0;
    if(!blink){
      ctx.save();ctx.translate(px,py);
      if(this.facing===-1)ctx.scale(-1,1);
      const f=this.animFrame;
      // Shadow
      ctx.globalAlpha=0.35;ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(0,9,7,2,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      // Shield bubble
      if(this.shield>0){
        const sa=0.3+0.2*Math.sin(Date.now()/80);
        ctx.globalAlpha=sa;ctx.fillStyle='#00DDFF';
        ctx.beginPath();ctx.arc(0,-2,13,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=sa+0.3;ctx.strokeStyle='#00FFFF';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(0,-2,13,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=1;
      }
      // Speed boost trail
      if(this.speedBoost>0){
        ctx.globalAlpha=0.5;ctx.fillStyle='#00FF88';
        ctx.fillRect(-2,6,2,7);ctx.fillRect(1,6,2,7);
        ctx.globalAlpha=1;
      }
      // Boots (animated)
      ctx.fillStyle='#111122';
      if(f===0){ctx.fillRect(-5,5,4,6);ctx.fillRect(2,7,4,4);}
      else{ctx.fillRect(-5,7,4,4);ctx.fillRect(2,5,4,6);}
      // Boot highlights
      ctx.fillStyle='#223355';
      if(f===0){ctx.fillRect(-5,5,4,1);ctx.fillRect(2,7,4,1);}
      else{ctx.fillRect(-5,7,4,1);ctx.fillRect(2,5,4,1);}
      // Armored thighs
      ctx.fillStyle='#1E3A2F';
      if(f===0){ctx.fillRect(-5,2,4,4);ctx.fillRect(2,4,4,2);}
      else{ctx.fillRect(-5,4,4,2);ctx.fillRect(2,2,4,4);}
      // Thigh armor edge
      ctx.fillStyle='#00AA88';
      if(f===0){ctx.fillRect(-5,2,1,4);ctx.fillRect(2,4,1,2);}
      else{ctx.fillRect(-5,4,1,2);ctx.fillRect(2,2,1,4);}
      // Belt
      ctx.fillStyle='#2A1F1A';ctx.fillRect(-5,1,10,2);
      ctx.fillStyle='#CCAA00';ctx.fillRect(-1,1,3,2); // buckle
      ctx.fillStyle='#FFCC00';ctx.fillRect(0,1,1,2);
      // Body armor
      ctx.fillStyle='#1A3A28';ctx.fillRect(-5,-6,10,8);
      // Chest plate
      ctx.fillStyle='#235534';ctx.fillRect(-4,-5,8,6);
      // Chest armor details
      ctx.fillStyle='#00BB99';ctx.fillRect(-4,-6,8,1); // top trim
      ctx.fillStyle='#00BB99';ctx.fillRect(-5,-1,1,5); // left trim
      ctx.fillStyle='#00BB99';ctx.fillRect(4,-1,1,5);  // right trim
      ctx.fillStyle='#004433';ctx.fillRect(-1,-4,2,4); // center stripe
      ctx.fillStyle='#00DDBB';ctx.fillRect(-1,-4,1,1); // chip top
      // Arms
      ctx.fillStyle='#1A3A28';
      ctx.fillRect(-7,-5,3,5);ctx.fillRect(5,-5,3,5);
      ctx.fillStyle='#00AA88';ctx.fillRect(-7,-5,1,3);ctx.fillRect(7,-5,1,3);
      // Gloves
      ctx.fillStyle='#0A0A0A';ctx.fillRect(-8,-3,3,4);ctx.fillRect(5,-3,3,4);
      ctx.fillStyle='#333';ctx.fillRect(-8,-3,3,1);ctx.fillRect(5,-3,3,1);
      // Helmet base
      ctx.fillStyle='#0F1F18';ctx.fillRect(-5,-14,10,8);
      // Helmet dome
      ctx.fillStyle='#162A1E';
      ctx.beginPath();ctx.arc(0,-14,5,Math.PI,0);ctx.fill();
      // Visor
      ctx.fillStyle='#002244';ctx.fillRect(-4,-13,8,5);
      // Visor glow
      ctx.fillStyle='#0099DD';ctx.fillRect(-3,-12,6,3);
      ctx.fillStyle='#00CCFF';ctx.fillRect(-3,-11,6,1);
      // Visor reflection
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(-3,-13,3,1);
      // Helmet side details
      ctx.fillStyle='#00AA88';ctx.fillRect(-5,-13,1,3);ctx.fillRect(4,-13,1,3);
      // Antenna
      ctx.fillStyle='#009977';ctx.fillRect(3,-19,1,5);
      ctx.fillStyle='#00FFCC';ctx.fillRect(2,-20,3,2);
      ctx.restore();
    }
    // Weapon arm (rotates with aim angle)
    ctx.save();ctx.translate(px,py);ctx.rotate(this.angle);
    const wc=WEAPONS[this.weapon].col;
    // Grip block
    ctx.fillStyle='#1A1A1A';ctx.fillRect(0,-2,5,5);
    ctx.fillStyle='#333';ctx.fillRect(0,-2,5,1);
    // Barrel
    ctx.fillStyle='#2A2A2A';ctx.fillRect(4,-1,10,3);
    // Weapon color stripe
    ctx.fillStyle=wc;ctx.fillRect(5,-1,5,3);
    ctx.globalAlpha=0.5;ctx.fillStyle=wc;ctx.fillRect(4,-2,10,1);
    ctx.globalAlpha=1;
    // Muzzle
    ctx.fillStyle='#111';ctx.fillRect(13,-1,3,3);
    ctx.fillStyle='#000';ctx.fillRect(15,0,2,1);
    ctx.restore();
  }
}

// ── Enemy base ────────────────────────────────────────────────────────────────
class Enemy {
  constructor(x,y){
    this.x=x;this.y=y;this.w=10;this.h=12;
    this.hp=1;this.maxHp=1;this.speed=30;
    this.animFrame=0;this.animTimer=0;this.angle=0;
    this.scoreValue=100;this.dead=false;this.hitFlash=0;
    this.dropChance=0.15;this.isBoss=false;
    this.frozen=0;this.slowFactor=0.3;
  }
  update(dt,player){
    if(this.frozen>0)this.frozen-=dt;
    const spd=this.frozen>0?this.speed*this.slowFactor:this.speed;
    const dx=player.x-this.x,dy=player.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1){
      this.x+=(dx/dist)*spd*dt;this.y+=(dy/dist)*spd*dt;
      this.angle=Math.atan2(dy,dx);
    }
    this.animTimer+=dt;if(this.animTimer>=0.15){this.animTimer=0;this.animFrame^=1;}
    if(this.hitFlash>0)this.hitFlash-=dt;
    // Repulsion: hard position constraint — enemy can never overlap player
    if(!this.isBoss){
      const rdx=this.x-player.x,rdy=this.y-player.y;
      const rdist=Math.sqrt(rdx*rdx+rdy*rdy);
      const minDist=(this.w+10)*0.5;
      if(rdist<minDist){
        if(rdist>0.01){
          // Teleport to exact minimum separation — guarantees no sticking regardless of speed
          this.x=player.x+(rdx/rdist)*minDist;
          this.y=player.y+(rdy/rdist)*minDist;
        } else {
          // Exactly on top — push in random direction
          const a=Math.random()*Math.PI*2;
          this.x=player.x+Math.cos(a)*minDist;
          this.y=player.y+Math.sin(a)*minDist;
        }
      }
    }
  }
  takeDamage(dmg){
    this.hp-=dmg;this.hitFlash=0.08;
    if(this.hp<=0)this.dead=true;
  }
  drawHpBar(ctx,w=14){
    if(this.hp===this.maxHp)return;
    const bx=Math.round(this.x)-w/2,by=Math.round(this.y)-16;
    ctx.fillStyle='#330000';ctx.fillRect(bx,by,w,2);
    ctx.fillStyle=PAL.RED;ctx.fillRect(bx,by,Math.round(w*this.hp/this.maxHp),2);
  }
}

class ShooterEnemy extends Enemy {
  constructor(x,y){super(x,y);this.hp=2;this.maxHp=2;this.speed=22;this.scoreValue=300;this.preferDist=130;this.shootTimer=rand(0.5,2);this.dropChance=0.4;}

class Boss1 extends Enemy {

    this.charging=false;this.chargeVx=0;this.chargeVy=0;
    this.chargeTime=0;this.name='TANK COMMANDER';
    this.dropChance=1;this.dropType='weapon_rocket';
  }
  update(dt,player,bullets){
    const hpR=this.hp/this.maxHp;
    if(hpR<0.5&&this.phase===1){this.phase=2;this.speed=22;}
    if(hpR<0.25&&this.phase===2){this.phase=3;this.speed=30;}
    const dx=player.x-this.x,dy=player.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    this.angle=Math.atan2(dy,dx);
    if(this.hitFlash>0)this.hitFlash-=dt;
    this.animTimer+=dt;if(this.animTimer>=0.2){this.animTimer=0;this.animFrame^=1;}
    if(this.charging){
      this.x+=this.chargeVx*dt;this.y+=this.chargeVy*dt;
      this.chargeTime-=dt;
      if(this.chargeTime<=0){this.charging=false;}
      this.x=clamp(this.x,14,W-14);this.y=clamp(this.y,16,H-16);
    } else {
      if(dist>1){this.x+=(dx/dist)*this.speed*dt;this.y+=(dy/dist)*this.speed*dt;}
      this.x=clamp(this.x,14,W-14);this.y=clamp(this.y,16,H-16);
    }
    this.shootTimer-=dt;
    if(this.shootTimer<=0){
      if(this.phase===1){this.shootTimer=1.8;this._shoot3(bullets);}
      else if(this.phase===2){
        this.shootTimer=1.2;this._shoot5(bullets);
        if(Math.random()<0.3){this.charging=true;const a=this.angle;this.chargeVx=Math.cos(a)*100;this.chargeVy=Math.sin(a)*100;this.chargeTime=0.5;}
      } else {
        this.shootTimer=0.8;this._shoot8(bullets);
        if(!this.charging&&Math.random()<0.4){this.charging=true;const a=this.angle;this.chargeVx=Math.cos(a)*130;this.chargeVy=Math.sin(a)*130;this.chargeTime=0.45;}
      }
    }
  }
  _shoot3(bullets){for(let i=-1;i<=1;i++){const b=new Bullet(this.x,this.y,this.angle+i*0.25,'enemy');b.speed=80;bullets.push(b);}}
  _shoot5(bullets){for(let i=-2;i<=2;i++){const b=new Bullet(this.x,this.y,this.angle+i*0.22,'enemy');b.speed=90;bullets.push(b);}}
  _shoot8(bullets){for(let i=0;i<8;i++){const b=new Bullet(this.x,this.y,this.angle+i*Math.PI/4,'enemy');b.speed=100;bullets.push(b);}}
  draw(ctx){
    const px=Math.round(this.x),py=Math.round(this.y);
    ctx.save();ctx.translate(px,py);
    if(this.hitFlash>0){ctx.fillStyle=PAL.WHITE;ctx.fillRect(-14,-20,28,32);ctx.restore();return;}
    const bodyCol=this.phase===3?PAL.RED:(this.phase===2?PAL.ORANGE:PAL.BROWN);
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.ellipse(0,16,14,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2A1A0A';const f=this.animFrame;
    if(f===0){ctx.fillRect(-10,8,8,10);ctx.fillRect(4,11,8,7);}
    else{ctx.fillRect(-10,11,8,7);ctx.fillRect(4,8,8,10);}
    ctx.fillStyle=bodyCol;ctx.fillRect(-12,-8,24,16);
    ctx.fillStyle=PAL.DARKGREY;ctx.fillRect(-14,-10,6,5);ctx.fillRect(8,-10,6,5);
    ctx.fillStyle='#7A3A16';ctx.fillRect(-8,-6,16,10);
    ctx.fillStyle=PAL.DARKGREY;ctx.fillRect(-4,-4,8,6);
    ctx.save();ctx.rotate(this.angle);
    ctx.fillStyle=PAL.DARKGREY;ctx.fillRect(10,-3,14,6);
    ctx.fillStyle=bodyCol;ctx.fillRect(8,-4,6,8);
    ctx.fillStyle=PAL.BLACK;ctx.fillRect(23,-1,2,2);
    ctx.restore();
    ctx.fillStyle=bodyCol;ctx.fillRect(-8,-20,16,12);
    ctx.fillStyle=PAL.DARKBLUE;ctx.fillRect(-6,-17,12,5);
    ctx.fillStyle=PAL.CYAN;ctx.fillRect(-4,-15,3,2);ctx.fillRect(2,-15,3,2);
    if(this.phase>=2){ctx.fillStyle=PAL.RED;ctx.fillRect(-4,-15,3,2);ctx.fillRect(2,-15,3,2);}
    if(this.phase===3){ctx.globalAlpha=0.4+0.3*Math.sin(Date.now()/80);ctx.fillStyle=PAL.RED;ctx.fillRect(-14,-22,28,34);ctx.globalAlpha=1;}
    ctx.restore();this.drawHpBar(ctx,28);
  }
}

// ── Boss 6 : Necro Titan ──────────────────────────────────────────────────────
class Boss6 extends Enemy {

  }
  update(dt,player,bullets,enemies){

    if(hpR<0.6&&this.phase===1){this.phase=2;this.speed=14;}
    if(hpR<0.3&&this.phase===2){this.phase=3;this.speed=20;}
    const dx=player.x-this.x,dy=player.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    this.angle=Math.atan2(dy,dx);
    if(this.hitFlash>0)this.hitFlash-=dt;
    this.animTimer+=dt;if(this.animTimer>=0.2){this.animTimer=0;this.animFrame^=1;}
    if(this.charging){
      this.x+=this.chargeVx*dt;this.y+=this.chargeVy*dt;this.chargeTime-=dt;
      if(this.chargeTime<=0){
        this.charging=false;

    ctx.fillStyle=PAL.GREY;ctx.fillRect(-16,-10,6,8);ctx.fillRect(10,-10,6,8);

    ctx.fillStyle=PAL.GREY;ctx.fillRect(10,-2,16,4);
    ctx.fillStyle=PAL.CYAN;ctx.fillRect(10,-3,16,1);
    ctx.fillStyle=PAL.WHITE;ctx.fillRect(25,-2,3,1);

    if(this.phase>=2){
      ctx.save();ctx.rotate(this.angle+1.0);ctx.globalAlpha=0.4;
      ctx.fillStyle=PAL.LAVENDER;ctx.fillRect(10,-2,14,3);ctx.globalAlpha=1;ctx.restore();
    }
    ctx.fillStyle=PAL.WHITE;ctx.fillRect(-9,-22,18,14);
    ctx.fillStyle=PAL.BLACK;ctx.fillRect(-7,-20,4,4);ctx.fillRect(3,-20,4,4);
    ctx.fillStyle=PAL.DARKGREY;ctx.fillRect(-8,-8,16,4);
    ctx.fillStyle=PAL.BLACK;ctx.fillRect(-6,-8,12,2);

      ctx.fillStyle=PAL.RED;ctx.fillRect(-6,-19,3,3);ctx.fillRect(4,-19,3,3);ctx.globalAlpha=1;

// ── Level Manager ─────────────────────────────────────────────────────────────
class LevelManager {
  constructor(game){
    this.game=game;this.currentLevel=1;this.maxLevel=15;
    this.spawnQueue=[];this.spawnTimer=0;this.levelComplete=false;
    this.isBonus=false;this.bonusTime=0;this.bonusKills=0;this.bonusTarget=0;
    this.isBossLevel=false;
  }
  loadLevel(n){
    this.currentLevel=n;this.levelComplete=false;
    this.isBonus=false;this.isBossLevel=false;
    this.spawnQueue=this._buildQueue(n);this.spawnTimer=1.5;
    this.game.enemies=[];this.game.bullets=[];this.game.pickups=[];
    this.game.player.x=W/2;this.game.player.y=H/2;
  }
  _buildQueue(n){
    const q=[];
    const iv=[0,2.2,1.8,1.4,1.2,1.0,0.9,0.8,0.75,0.65,0.6,0.5,0.45,0.4,0.35,0.3][Math.min(n,15)];
    const add=(type,count,delay)=>{for(let i=0;i<count;i++)q.push({type,delay:delay!==undefined?delay:iv});};
    if(n===1){add('grunt',8);}
    else if(n===2){add('grunt',12);add('fast',2);}
    else if(n===3){this.isBossLevel=true;add('grunt',4);add('boss3',1,2.5);}
    else if(n===4){
      this.isBonus=true;this.bonusTime=25;this.bonusKills=0;this.bonusTarget=15;
      add('grunt',12);add('fast',6);}
    else if(n===5){add('grunt',14);add('tank',3);add('fast',4);}
    else if(n===6){this.isBossLevel=true;add('shooter',4);add('boss4',1,2.5);}
    else if(n===7){add('grunt',18);add('fast',8);add('tank',4);add('shooter',4);}
    else if(n===8){this.isBossLevel=true;add('boss1',1);}
    else if(n===9){add('grunt',20);add('fast',10);add('shooter',6);}
    else if(n===10){add('grunt',20);add('tank',5);add('fast',8);add('shooter',6);}
    else if(n===11){this.isBossLevel=true;add('fast',6);add('shooter',4);add('boss5',1,2.5);}
    else if(n===12){
      this.isBonus=true;this.bonusTime=20;this.bonusKills=0;this.bonusTarget=20;
      add('fast',12);add('grunt',10);}
    else if(n===13){this.isBossLevel=true;add('tank',6);add('shooter',4);add('boss6',1,2.5);}
    else if(n===14){add('grunt',28);add('fast',18);add('tank',8);add('shooter',10);}
    else if(n===15){this.isBossLevel=true;add('boss2',1);}
    return q;
  }
  _spawnAt(type){
    const side=randInt(0,3);let x,y;
    if(side===0){x=rand(0,W);y=-20;}
    else if(side===1){x=W+20;y=rand(0,H);}
    else if(side===2){x=rand(0,W);y=H+20;}
    else{x=-20;y=rand(0,H);}
    if(type==='grunt')return new GruntEnemy(x,y);
    if(type==='tank')return new TankEnemy(x,y);
    if(type==='fast')return new FastEnemy(x,y);
    if(type==='shooter')return new ShooterEnemy(x,y);
    if(type==='boss1')return new Boss1(W/2,-40);
    if(type==='boss2')return new Boss2(W/2,-50);
    if(type==='boss3')return new Boss3(W/2,-40);
    if(type==='boss4')return new Boss4(W/2,-40);
    if(type==='boss5')return new Boss5(W/2,-50);
    if(type==='boss6')return new Boss6(W/2,-50);
  }
  update(dt){
    if(this.isBonus){
      this.bonusTime-=dt;
      if(this.bonusTime<=0){
        this.levelComplete=true;this.game.score+=this.bonusKills*200;
        this.game.state='LEVEL_COMPLETE';
        if(game.audio)game.audio.levelUp();return;
      }
    }
    if(this.spawnQueue.length>0){
      this.spawnTimer-=dt;
      if(this.spawnTimer<=0){
        const next=this.spawnQueue.shift();
        this.game.enemies.push(this._spawnAt(next.type));
        this.spawnTimer=next.delay;
      }
    }
    if(this.spawnQueue.length===0&&this.game.enemies.length===0&&!this.levelComplete){
      this.levelComplete=true;
      if(this.currentLevel>=this.maxLevel){
        const g=this.game;
        g._newRecord=g.score>g.highScore;
        if(g._newRecord){g.highScore=g.score;localStorage.setItem('retro_assault_hi',g.highScore);}
        if(g._qualifiesForLeaderboard()){g.state='NAME_INPUT';g._pendingName='';}
        else{g.state='VICTORY';}
      }
      else{this.game.bonusTimer=2.0;this.game.state='LEVEL_COMPLETE';}
      if(game.audio)game.audio.levelUp();
    }
  }
  nextLevel(){
    if(this.currentLevel>=this.maxLevel){this.game.state='VICTORY';return;}
    this.loadLevel(this.currentLevel+1);this.game.state='PLAYING';
  }
}

// ── Audio ─────────────────────────────────────────────────────────────────────
class RetroAudio {
  constructor(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}this._muted=false;this._bgmRunning=false;}
  _b(freq,dur,type='square',vol=0.07){
    if(!this.ctx||this._muted)return;
    try{
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.connect(g);g.connect(this.ctx.destination);
      o.type=type;o.frequency.setValueAtTime(freq,this.ctx.currentTime);
      g.gain.setValueAtTime(vol,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001,this.ctx.currentTime+dur);
      o.start();o.stop(this.ctx.currentTime+dur);
    }catch(e){}
  }
  shoot(w='pistol'){
    if(w==='shotgun'){this._b(220,0.08,'square',0.08);this._b(440,0.05,'square',0.05);}
    else if(w==='smg'){this._b(660,0.04,'square',0.04);}
    else if(w==='rocket'){this._b(120,0.15,'sawtooth',0.1);this._b(60,0.2,'square',0.08);}
    else if(w==='laser'){this._b(1200,0.08,'sine',0.05);this._b(800,0.08,'sine',0.03);}
    else if(w==='plasma'){this._b(60,0.25,'sawtooth',0.1);this._b(220,0.35,'sine',0.06);}
    else if(w==='freeze'){this._b(1400,0.1,'sine',0.04);this._b(1000,0.15,'sine',0.03);}
    else if(w==='flame'){this._b(180,0.06,'sawtooth',0.05);}
    else this._b(880,0.05,'square',0.05);
  }
  hit(){this._b(220,0.1,'sawtooth',0.06);}
  explosion(){this._b(80,0.3,'sawtooth',0.1);this._b(40,0.4,'square',0.08);}
  die(){this._b(110,0.25,'sawtooth',0.07);this._b(55,0.35,'square',0.05);}
  playerHit(){this._b(160,0.2,'sawtooth',0.09);}
  pickup(){[880,1047].forEach((f,i)=>setTimeout(()=>this._b(f,0.1,'sine',0.08),i*60));}
  levelUp(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this._b(f,0.15),i*100));}
  gameOver(){[440,330,220,110].forEach((f,i)=>setTimeout(()=>this._b(f,0.2,'sawtooth'),i*150));}
  bossWarning(){[220,220,330].forEach((f,i)=>setTimeout(()=>this._b(f,0.3,'sawtooth',0.12),i*200));}
  startBGM(){
    if(this._bgmRunning||!this.ctx)return;
    this._bgmRunning=true;
    // Master gain
    this._bgmGain=this.ctx.createGain();
    this._bgmGain.gain.value=this._muted?0:0.06;
    this._bgmGain.connect(this.ctx.destination);

    // ── Melody channel (triangle, bright lead) ──────────────────────────────
    // C minor pentatonic-ish action theme: C4 Eb4 F4 G4 Bb4
    const melody=[
      261,0,311,0,349,391,0,466,  // bar 1: ascending run
      466,0,391,349,0,311,261,0,  // bar 2: descending
      311,349,391,0,466,391,349,0, // bar 3: peak climb
      261,0,0,261,311,0,349,0     // bar 4: resolution
    ];
    this._melOsc=this.ctx.createOscillator();
    this._melOsc.type='triangle';
    const melGain=this.ctx.createGain();melGain.gain.value=0.55;
    this._melOsc.connect(melGain);melGain.connect(this._bgmGain);
    this._melOsc.start();

    // ── Bass channel (square, low octave root notes) ─────────────────────────
    const bass=[
      65,0,65,0,73,0,73,0,
      65,0,65,0,65,0,65,0,
      73,0,73,0,78,0,78,0,
      65,0,65,0,65,0,0,0
    ];
    this._bassOsc=this.ctx.createOscillator();
    this._bassOsc.type='square';
    const bassGain=this.ctx.createGain();bassGain.gain.value=0.3;
    this._bassOsc.connect(bassGain);bassGain.connect(this._bgmGain);
    this._bassOsc.start();

    // ── Arpeggio channel (pulse-like, decorative high notes) ─────────────────
    const arp=[
      523,659,784,659,523,659,784,659,
      523,659,784,659,523,622,784,622,
      587,740,880,740,587,740,880,740,
      523,659,784,659,523,659,523,0
    ];
    this._arpOsc=this.ctx.createOscillator();
    this._arpOsc.type='square';
    const arpGain=this.ctx.createGain();arpGain.gain.value=0.18;
    this._arpOsc.connect(arpGain);arpGain.connect(this._bgmGain);
    this._arpOsc.start();

    // ── Percussion (noise bursts via gain-envelope on a buffer source) ────────
    // kick on beats 0,8,16,24  snare on beats 4,12,20,28
    this._bgmStep=0;
    const stepMs=110; // ~136 BPM (16 steps per bar)
    this._bgmTimer=setInterval(()=>{
      if(!this._bgmRunning)return;
      const s=this._bgmStep;
      const t=this.ctx.currentTime;
      const total=melody.length;
      // melody
      const mf=melody[s%total];
      if(mf>0)this._melOsc.frequency.setValueAtTime(mf,t);
      else this._melOsc.frequency.setValueAtTime(0.0001,t);
      // bass
      const bf=bass[s%total];
      if(bf>0)this._bassOsc.frequency.setValueAtTime(bf,t);
      else this._bassOsc.frequency.setValueAtTime(0.0001,t);
      // arp
      const af=arp[s%total];
      if(af>0)this._arpOsc.frequency.setValueAtTime(af,t);
      else this._arpOsc.frequency.setValueAtTime(0.0001,t);
      // kick on every 8 steps
      if(s%8===0)this._drum(t,80,0.08,'kick');
      // snare on steps 4,12,20,28
      if(s%8===4)this._drum(t,200,0.05,'snare');
      // hi-hat every 2 steps
      if(s%2===1)this._drum(t,8000,0.015,'hat');
      this._bgmStep=(s+1)%total;
    },stepMs);
  }
  _drum(t,freq,vol,type){
    if(!this.ctx||this._muted)return;
    const osc=this.ctx.createOscillator();
    const g=this.ctx.createGain();
    osc.type=type==='hat'?'sawtooth':'square';
    osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(type==='kick'?0.15:type==='snare'?0.1:0.04));
    osc.connect(g);g.connect(this._bgmGain||this.ctx.destination);
    osc.start(t);osc.stop(t+0.2);
  }
  stopBGM(){
    this._bgmRunning=false;clearInterval(this._bgmTimer);
    try{this._melOsc.stop();}catch(e){}
    try{this._bassOsc.stop();}catch(e){}
    try{this._arpOsc.stop();}catch(e){}
  }
  setMuted(v){
    this._muted=v;
    if(this._bgmGain)this._bgmGain.gain.value=v?0:0.06;
  }
}

// ── Background ────────────────────────────────────────────────────────────────
function buildBackground(){
  const bg=document.createElement('canvas');bg.width=W;bg.height=H;
  const c=bg.getContext('2d');
  c.fillStyle='#111D35';c.fillRect(0,0,W,H);
  c.strokeStyle='#0D1828';c.lineWidth=1;
  for(let x=0;x<=W;x+=8){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(let y=0;y<=H;y+=8){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
  for(let tx=0;tx<W/8;tx++)for(let ty=0;ty<H/8;ty++)
    if(Math.random()<0.04){c.fillStyle='#0A1220';c.fillRect(tx*8+1,ty*8+1,6,6);}
  return bg;
}

// ── CRT ───────────────────────────────────────────────────────────────────────
function drawCRT(ctx,cw,ch){
  for(let y=0;y<ch;y+=4){ctx.fillStyle='rgba(0,0,0,0.13)';ctx.fillRect(0,y,cw,2);}
  const g=ctx.createRadialGradient(cw/2,ch/2,ch*0.25,cw/2,ch/2,ch*0.72);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=g;ctx.fillRect(0,0,cw,ch);
}

// ── Aim line ──────────────────────────────────────────────────────────────────
function drawAimLine(ctx,player,mouse){
  const tipX=player.x+Math.cos(player.angle)*14,tipY=player.y+Math.sin(player.angle)*14;
  const wc=WEAPONS[player.weapon].col;
  ctx.save();ctx.globalAlpha=0.3;ctx.strokeStyle=wc;ctx.lineWidth=0.5;
  ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(tipX,tipY);ctx.lineTo(mouse.x,mouse.y);ctx.stroke();
  ctx.setLineDash([]);ctx.globalAlpha=0.55;ctx.fillStyle=PAL.RED;
  ctx.fillRect(Math.round(mouse.x)-1,Math.round(mouse.y)-1,3,3);ctx.restore();
}

// ── Crosshair ─────────────────────────────────────────────────────────────────
function drawCrosshair(ctx,mx,my,weapon){
  const col=WEAPONS[weapon]?.col||PAL.WHITE;
  const s=6,gap=3;
  // Outer glow ring
  ctx.globalAlpha=0.25;ctx.strokeStyle=col;ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(mx,my,s+3,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=1;
  // Four arms
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(mx-s-gap,my);ctx.lineTo(mx-gap,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx+gap,my);ctx.lineTo(mx+s+gap,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx,my-s-gap);ctx.lineTo(mx,my-gap);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx,my+gap);ctx.lineTo(mx,my+s+gap);ctx.stroke();
  // Center dot (weapon color)
  ctx.fillStyle=col;ctx.fillRect(mx-1,my-1,3,3);
  ctx.fillStyle='#fff';ctx.fillRect(mx,my,1,1);
  // Corner brackets (weapon-colored)
  ctx.strokeStyle=col;ctx.lineWidth=1;
  const br=s+2,bc=3;
  ctx.beginPath();ctx.moveTo(mx-br,my-br+bc);ctx.lineTo(mx-br,my-br);ctx.lineTo(mx-br+bc,my-br);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx+br-bc,my-br);ctx.lineTo(mx+br,my-br);ctx.lineTo(mx+br,my-br+bc);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx-br,my+br-bc);ctx.lineTo(mx-br,my+br);ctx.lineTo(mx-br+bc,my+br);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx+br-bc,my+br);ctx.lineTo(mx+br,my+br);ctx.lineTo(mx+br,my+br-bc);ctx.stroke();
}

  ctx.font='9px monospace';ctx.fillStyle='#8888AA';
  ctx.fillText('HI '+String(g.highScore).padStart(6,'0'),CW/2,20);ctx.textAlign='left';
  // ── Top-right HP bar (segmented) ──
  const hpBarW=120,hpBarH=12,hpX=CW-hpBarW-4,hpY=4;

  ctx.font='bold 9px monospace';ctx.fillStyle='#FF4444';

  const segW=Math.floor((hpBarW-1)/g.player.maxHp)-1;
  for(let i=0;i<g.player.maxHp;i++){
    const sx=hpX+i*(segW+1);
    ctx.fillStyle='#300000';ctx.fillRect(sx,hpY+12,segW,hpBarH);
    if(i<g.player.hp){

  // Shield / speed indicators

    ctx.fillStyle='rgba(0,200,255,0.2)';ctx.fillRect(hpX-4,30,hpBarW+8,6);

  }
  if(g.player.speedBoost>0){
    ctx.font='bold 8px monospace';ctx.fillStyle='#00FF88';
    ctx.textAlign='right';ctx.fillText('▶ SPEED '+g.player.speedBoost.toFixed(1)+'s',sIconX,30);ctx.textAlign='left';
  }
  // ── Active weapon indicator (bottom-left) ──
  const w=g.player.weapon;const wdef=WEAPONS[w];
  const ammoTxt='∞';
  const noAmmo=false;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,CH-32,120,32);
  ctx.fillStyle=noAmmo?'rgba(255,0,0,0.15)':('rgba('+hexToRgb(wdef.col)+',0.1)');
  ctx.fillRect(0,CH-2,120,2);
  ctx.font='bold 11px monospace';ctx.fillStyle=noAmmo?'#FF4444':wdef.col;
  ctx.fillText(wdef.name,4,CH-28);
  ctx.font='bold 14px monospace';ctx.fillStyle=noAmmo?'#FF6666':PAL.WHITE;
  ctx.fillText(ammoTxt,4,CH-15);
  // ── Combo ──
  if(g.combo>1){
    const comboAlpha=Math.min(1,g.comboTimer/1.5);
    ctx.globalAlpha=comboAlpha;
    const cs=10+g.combo*2;
    ctx.font='bold '+cs+'px monospace';
    ctx.fillStyle=g.combo>=6?'#FF0000':(g.combo>=4?PAL.ORANGE:PAL.YELLOW);
    ctx.textAlign='right';ctx.fillText('×'+g.combo+' COMBO!',CW-4,CH-60);
    ctx.textAlign='left';ctx.globalAlpha=1;
  }
  // ── Enemies / kills ──
  const rem=g.enemies.length+g.level.spawnQueue.length;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,CH-16,CW,16);
  ctx.font='9px monospace';ctx.fillStyle='#666688';ctx.fillText('ENEMIES: '+rem,4,CH-13);
  ctx.textAlign='right';ctx.fillText('KILLS: '+g.kills,CW-4,CH-13);ctx.textAlign='left';
  if(g.level.isBonus){
    ctx.font='bold 14px monospace';ctx.textAlign='center';
    const t=g.level.bonusTime;
    ctx.fillStyle=t<5?PAL.RED:(t<10?PAL.ORANGE:PAL.YELLOW);
    ctx.fillText('BONUS: '+t.toFixed(1)+'s  KILLS: '+g.level.bonusKills+'/'+g.level.bonusTarget,CW/2,CH-36);

  }
  const boss=g.enemies.find(e=>e.isBoss);

    // Boss panel background
    ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(bx-8,by-18,bw+16,bh+26);
    ctx.fillStyle='rgba(255,0,0,0.2)';ctx.fillRect(bx-8,by-18,bw+16,2);
    // Boss name (pulsing red)
    const pulse=0.7+0.3*Math.sin(Date.now()/250);
    ctx.globalAlpha=pulse;
    ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillStyle='#FF2222';
    ctx.fillText('⚠  '+boss.name+'  ⚠',CW/2,by-14);
    ctx.globalAlpha=1;ctx.textAlign='left';
    // Bar track
    ctx.fillStyle='#200000';ctx.fillRect(bx,by,bw,bh);
    const ratio=boss.hp/boss.maxHp;
    // Gradient-like bar using 3 strips
    const fw=Math.round(bw*ratio);
    ctx.fillStyle=ratio>0.5?'#880000':(ratio>0.25?'#884400':'#555500');
    ctx.fillRect(bx,by,fw,bh);
    ctx.fillStyle=ratio>0.5?'#FF3333':(ratio>0.25?'#FF8800':'#DDCC00');
    ctx.fillRect(bx,by,fw,Math.floor(bh/2));
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(bx,by,fw,3);
    // Bar border
    ctx.strokeStyle='#550000';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
    // HP text
    ctx.font='bold 8px monospace';ctx.fillStyle=PAL.WHITE;ctx.textAlign='center';
    ctx.fillText(boss.hp+' / '+boss.maxHp,CW/2,by+bh+4);
    ctx.font='bold 8px monospace';ctx.fillStyle=PAL.ORANGE;ctx.textAlign='left';
    ctx.fillText('PHASE '+boss.phase,bx,by+bh+4);ctx.textAlign='left';
  }
}

// ── Virtual controls (mobile) ─────────────────────────────────────────────────
function drawVirtualControls(ctx,g){
  const input=g.input;
  if(!input||!input.isMobile)return;
  const s=input._scale;
  const isPortrait=g._isPortrait||false;
  const vch=g._vch||CH; // total logical canvas height
  const maxR=CW*JOY_R; // max throw in canvas coords

  // ── Draw one joystick ────────────────────────────────────────────────────────
  function drawJoystick(joy, defX, defY, ringCol, label, isFireJoy){
    const baseX=joy.active?(joy.baseCSS.x/s):defX;
    const baseY=joy.active?(joy.baseCSS.y/s):defY;
    const rawKX=joy.active?(joy.knobCSS.x/s):baseX;
    const rawKY=joy.active?(joy.knobCSS.y/s):baseY;
    const dkx=rawKX-baseX,dky=rawKY-baseY;
    const dkd=Math.sqrt(dkx*dkx+dky*dky);
    const knobX=dkd>maxR?baseX+dkx/dkd*maxR:rawKX;
    const knobY=dkd>maxR?baseY+dky/dkd*maxR:rawKY;
    const active=joy.active;
    const firing=isFireJoy&&input.isFiring;

    // Soft glow behind base
    ctx.globalAlpha=0.1;
    ctx.fillStyle=ringCol;
    ctx.beginPath();ctx.arc(baseX,baseY,maxR+22,0,Math.PI*2);ctx.fill();

    // Base plate (dark fill + colored ring)
    ctx.globalAlpha=active?0.45:0.28;
    ctx.fillStyle='#0a0a18';
    ctx.beginPath();ctx.arc(baseX,baseY,maxR+10,0,Math.PI*2);ctx.fill();

    ctx.globalAlpha=active?0.85:0.45;
    ctx.strokeStyle=firing?PAL.RED:ringCol;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(baseX,baseY,maxR+10,0,Math.PI*2);ctx.stroke();

    // Inner ring guide
    ctx.globalAlpha=0.18;
    ctx.strokeStyle=ringCol;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(baseX,baseY,maxR*0.5,0,Math.PI*2);ctx.stroke();

    // Direction line when active
    if(active&&dkd>5){
      ctx.globalAlpha=0.4;
      ctx.strokeStyle=ringCol;ctx.lineWidth=1.5;
      ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(baseX,baseY);ctx.lineTo(knobX,knobY);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Knob shadow
    ctx.globalAlpha=0.4;
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(knobX+1.5,knobY+1.5,20,0,Math.PI*2);ctx.fill();

    // Knob body
    ctx.globalAlpha=active?0.95:0.65;
    ctx.fillStyle=firing?PAL.RED:ringCol;
    ctx.beginPath();ctx.arc(knobX,knobY,20,0,Math.PI*2);ctx.fill();

    // Knob highlight
    ctx.globalAlpha=0.35;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(knobX-5,knobY-5,9,0,Math.PI*2);ctx.fill();

    // Knob label
    ctx.globalAlpha=active?1:0.6;
    ctx.fillStyle=PAL.WHITE;
    ctx.font='bold 8px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,knobX,knobY);

    ctx.globalAlpha=1;ctx.textAlign='left';ctx.textBaseline='top';
  }

  // Joystick Y positions: in portrait they're in the controls zone below game
  const ctrlH=isPortrait?(vch-CH):0;
  const joyY=isPortrait?(CH+ctrlH*0.40):(CH*0.80);
  const joyLX=CW*0.15, joyRX=CW*0.85;

  // Left joystick — movement
  drawJoystick(input.joystick, joyLX, joyY, PAL.CYAN, 'MOVE', false);
  // Right joystick — aim + fire
  drawJoystick(input.rightJoy, joyRX, joyY, PAL.ORANGE, input.isFiring?'FIRE':'AIM', true);

  drawWeaponStrip(ctx,g);
}

// ── Weapon strip (desktop + mobile) ──────────────────────────────────────────
function drawWeaponStrip(ctx,g){
  const input=g.input;
  const isMobile=input&&input.isMobile;
  const isPortrait=g._isPortrait||false;
  const vch=g._vch||CH;
  const slots=Object.keys(WEAPONS);
  const btnW=38,gap=3,totalW=slots.length*(btnW+gap)-gap;
  const startX=(CW-totalW)/2;
  const btnH=isPortrait?34:30,r2=4;
  const startY=isPortrait?(CH+(vch-CH)*0.72):(CH-38);

  slots.forEach((sw,i)=>{
    const has=sw==='pistol'||(g.player&&g.player.ammo[sw]>0);
    const active=g.player&&g.player.weapon===sw;
    const wdef=WEAPONS[sw];
    const bx=startX+i*(btnW+gap),by=startY;

    // Weapon switch flash overlay
    const flash=active&&g.player._weaponFlash>0?g.player._weaponFlash:0;

    // Button bg
    ctx.globalAlpha=active?0.88:(has?0.38:0.12);
    ctx.fillStyle=active?wdef.col:(has?'#1a1a2e':'#0a0a0a');
    ctx.beginPath();
    ctx.moveTo(bx+r2,by);ctx.lineTo(bx+btnW-r2,by);ctx.arcTo(bx+btnW,by,bx+btnW,by+r2,r2);
    ctx.lineTo(bx+btnW,by+btnH-r2);ctx.arcTo(bx+btnW,by+btnH,bx+btnW-r2,by+btnH,r2);
    ctx.lineTo(bx+r2,by+btnH);ctx.arcTo(bx,by+btnH,bx,by+btnH-r2,r2);
    ctx.lineTo(bx,by+r2);ctx.arcTo(bx,by,bx+r2,by,r2);ctx.closePath();ctx.fill();

    // Border
    ctx.globalAlpha=active?1:(has?0.55:0.18);
    ctx.strokeStyle=active?'#fff':(has?wdef.col:PAL.DARKGREY);
    ctx.lineWidth=active?1.5:0.75;
    ctx.beginPath();
    ctx.moveTo(bx+r2,by);ctx.lineTo(bx+btnW-r2,by);ctx.arcTo(bx+btnW,by,bx+btnW,by+r2,r2);
    ctx.lineTo(bx+btnW,by+btnH-r2);ctx.arcTo(bx+btnW,by+btnH,bx+btnW-r2,by+btnH,r2);
    ctx.lineTo(bx+r2,by+btnH);ctx.arcTo(bx,by+btnH,bx,by+btnH-r2,r2);
    ctx.lineTo(bx,by+r2);ctx.arcTo(bx,by,bx+r2,by,r2);ctx.closePath();ctx.stroke();

    // Number key / keyboard hint
    ctx.globalAlpha=active?0.6:(has?0.4:0.15);
    ctx.fillStyle=active?PAL.BLACK:PAL.GREY;
    ctx.font='6px monospace';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(isMobile?(i+1):'['+(i+1)+']',bx+2,by+2);

    // Weapon name
    ctx.globalAlpha=active?1:(has?0.8:0.2);
    ctx.fillStyle=active?PAL.BLACK:wdef.col;
    ctx.font=(active?'bold ':'')+7+'px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(sw.slice(0,4).toUpperCase(),bx+btnW/2,by+btnH*0.42);

    // Ammo: always infinite
    ctx.globalAlpha=active?0.75:0.55;
    ctx.fillStyle=active?PAL.BLACK:PAL.WHITE;
    ctx.font='7px monospace';
    ctx.fillText('∞',bx+btnW/2,by+btnH*0.78);

    // Weapon switch flash
    if(flash>0){
      ctx.globalAlpha=flash*0.5;
      ctx.fillStyle='#ffffff';
      ctx.beginPath();
      ctx.moveTo(bx+r2,by);ctx.lineTo(bx+btnW-r2,by);ctx.arcTo(bx+btnW,by,bx+btnW,by+r2,r2);
      ctx.lineTo(bx+btnW,by+btnH-r2);ctx.arcTo(bx+btnW,by+btnH,bx+btnW-r2,by+btnH,r2);
      ctx.lineTo(bx+r2,by+btnH);ctx.arcTo(bx,by+btnH,bx,by+btnH-r2,r2);
      ctx.lineTo(bx,by+r2);ctx.arcTo(bx,by,bx+r2,by,r2);ctx.closePath();ctx.fill();
    }

    ctx.globalAlpha=1;ctx.textAlign='left';ctx.textBaseline='top';
  });
}

function drawSlowMoOverlay(ctx,g){
  const t=g._slowMo; // remaining time
  const total=2.2;
  const fadeIn=Math.min(1,(total-t)/0.3);
  const fadeOut=t<0.5?t/0.5:1;
  const alpha=Math.min(fadeIn,fadeOut);
  // Blue vignette
  const grd=ctx.createRadialGradient(CW/2,CH/2,CH*0.25,CW/2,CH/2,CH*0.85);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(1,'rgba(30,100,200,0.45)');
  ctx.globalAlpha=alpha;ctx.fillStyle=grd;ctx.fillRect(0,0,CW,CH);
  // "BOSS DEFEATED" text
  if(t>0.6){
    const ta=Math.min(1,(total-t)/0.4);
    ctx.globalAlpha=ta*alpha;
    ctx.font='bold 28px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#224488';ctx.fillText('BOSS DEFEATED',CW/2+2,CH/2+2);
    ctx.fillStyle='#88CCFF';ctx.fillText('BOSS DEFEATED',CW/2,CH/2);
    ctx.textAlign='left';ctx.textBaseline='top';
  }
  ctx.globalAlpha=1;
}

function drawAchievement(ctx,g){
  const aq=g._achievementQueue;
  if(!aq||!aq.length)return;
  const a=aq[0];
  const total=3.5,slideTime=0.3;
  const elapsed=total-a.timer;
  const slideIn=Math.min(1,elapsed/slideTime);
  const slideOut=a.timer<slideTime?1-a.timer/slideTime:0;
  const slide=Math.max(slideIn-slideOut,0);
  const pw=190,ph=46,px=CW-pw*slide,py=4;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(px,py,pw,ph);
  ctx.fillStyle='rgba(255,200,0,0.8)';ctx.fillRect(px,py,pw,2);
  ctx.fillStyle='#CCAA00';ctx.font='bold 8px monospace';ctx.textBaseline='top';
  ctx.fillText('★ ACHIEVEMENT UNLOCKED',px+8,py+6);
  ctx.fillStyle=PAL.WHITE;ctx.font='bold 11px monospace';
  ctx.fillText(a.label,px+8,py+18);
  ctx.fillStyle=PAL.GREY;ctx.font='9px monospace';
  ctx.fillText(a.desc,px+8,py+32);
  ctx.restore();
}

function drawLeaderboard(ctx,g){

  // Subtle grid lines

  for(let x=0;x<CW;x+=16){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}

  // Top glow bar

  const ul=ctx.createLinearGradient(0,0,CW,0);
  ul.addColorStop(0,'rgba(0,0,0,0)');ul.addColorStop(0.5,'rgba(255,210,0,0.7)');ul.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ul;ctx.fillRect(0,28,CW,1);

  // ── Column headers ──
  const rowH=21,startY=36,padL=10,padR=10;

  ctx.textAlign='left';ctx.fillText('RANK',padL,startY);
  ctx.fillText('NAME',padL+34,startY);
  ctx.textAlign='right';ctx.fillText('SCORE',CW-padR-42,startY);
  ctx.fillText('DATE',CW-padR,startY);

  ctx.fillStyle='rgba(0,200,255,0.12)';ctx.fillRect(0,startY+9,CW,1);

  // ── Rows ──
  const lb=g._globalLB||[];
  const bodyY=startY+12;

  if(lb.length===0){
    ctx.textAlign='center';
    if(typeof window._fbFetchTop10==='function'){
      const pulse=0.5+0.5*Math.sin(Date.now()/400);
      ctx.fillStyle=`rgba(0,200,255,${0.35+0.25*pulse})`;
      ctx.font='11px monospace';ctx.fillText('LOADING SCORES…',CW/2,bodyY+50);
      // Spinner dots
      for(let d=0;d<3;d++){
        const a=(Date.now()/250+d*1.2)%(Math.PI*2);
        ctx.fillStyle=`rgba(0,200,255,${0.3+0.7*Math.max(0,Math.sin(a))})`;
        ctx.beginPath();ctx.arc(CW/2-12+d*12,bodyY+70,3,0,Math.PI*2);ctx.fill();
      }
    } else {
      ctx.fillStyle='#334';ctx.font='10px monospace';
      ctx.fillText('No scores yet — be the first!',CW/2,bodyY+50);
    }
  } else {
    lb.forEach((e,i)=>{
      const y=bodyY+i*rowH;
      const isTop3=i<3;
      const medalCol=i===0?'#FFD700':i===1?'#D0D0D8':i===2?'#E8904A':'#4A5068';
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':null;

      // Row background — top 3 get a tinted glow strip
      if(isTop3){
        const rowBg=ctx.createLinearGradient(0,y,CW,y);
        const alpha=i===0?0.10:i===1?0.07:0.05;
        rowBg.addColorStop(0,'rgba(0,0,0,0)');
        rowBg.addColorStop(0.3,`rgba(${i===0?'255,200,0':i===1?'192,192,220':'220,130,60'},${alpha})`);
        rowBg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=rowBg;ctx.fillRect(0,y,CW,rowH-1);
      } else if(i%2===0){
        ctx.fillStyle='rgba(255,255,255,0.018)';ctx.fillRect(0,y,CW,rowH-1);
      }

      // Rank / Medal
      if(medal){
        ctx.font='12px serif';ctx.textAlign='left';ctx.fillText(medal,padL-1,y+3);
      } else {
        ctx.font='bold 9px monospace';ctx.fillStyle=medalCol;
        ctx.textAlign='left';ctx.fillText('#'+(i+1),padL+1,y+5);
      }

      // Name
      const dn=e.name.length>15?e.name.slice(0,14)+'…':e.name;
      ctx.textAlign='left';ctx.font=(isTop3?'bold ':'')+'10px monospace';
      if(isTop3){ctx.shadowColor=medalCol;ctx.shadowBlur=6;}
      ctx.fillStyle=isTop3?medalCol:'#AABBCC';
      ctx.fillText(dn,padL+34,y+5);
      ctx.shadowBlur=0;

      // Score
      ctx.textAlign='right';ctx.font='bold 10px monospace';
      if(isTop3){ctx.shadowColor='#00DDFF';ctx.shadowBlur=8;}
      ctx.fillStyle='#00DDFF';
      const scoreStr=e.score>=1000000?(e.score/1000000).toFixed(1)+'M':
                     e.score>=1000?(e.score/1000).toFixed(1)+'K':
                     String(e.score);
      ctx.fillText(scoreStr,CW-padR-42,y+5);
      ctx.shadowBlur=0;

      // Date
      ctx.fillStyle='rgba(100,120,160,0.7)';ctx.font='7px monospace';
      ctx.textAlign='right';ctx.fillText(e.date||'',CW-padR,y+6);

      // Row divider
      ctx.fillStyle='rgba(0,150,255,0.07)';ctx.fillRect(padL,y+rowH-1,CW-padL*2,1);
    });
  }

  // ── Footer ──
  const footerY=CH-13;
  const fg=ctx.createLinearGradient(0,0,CW,0);
  fg.addColorStop(0,'rgba(0,0,0,0)');fg.addColorStop(0.5,'rgba(0,150,255,0.15)');fg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=fg;ctx.fillRect(0,footerY-5,CW,1);

  if(Math.floor(Date.now()/600)%2===0){
    ctx.font='bold 8px monospace';ctx.fillStyle='rgba(0,200,255,0.75)';ctx.textAlign='center';
    ctx.fillText('▶  PRESS ANY KEY TO CONTINUE  ◀',CW/2,footerY);
  }
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

// ── Game ──────────────────────────────────────────────────────────────────────
let game;
class Game {
  constructor(){
    this.canvas=document.getElementById('game');
    this.ctx=this.canvas.getContext('2d');
    this.state='START';this.last=0;this.accum=0;this.STEP=1000/60;
    this._dpr=1;this._cssScale=1;this._ready=false;this._shake=0;this._slowMo=0;
    this.input=new InputHandler(this.canvas);
    this._setupScale();
    this._ready=true;
    window.addEventListener('resize',()=>this._setupScale());
    this.bg=buildBackground();this.audio=null;
    this.highScore=parseInt(localStorage.getItem('retro_assault_hi')||'0');
    this._initGame();
  }
  _setupScale(){
    const dpr=window.devicePixelRatio||1;
    const vw=window.innerWidth,vh=window.innerHeight;
    // Portrait when screen is taller than wide
    const isPortrait=vh>vw*1.1;
    let s;
    if(isPortrait){
      // Fill full width; controls area lives below the game area
      s=vw/CW;
    } else {
      // Landscape: fit entire game into viewport
      s=Math.min(vw/CW,vh/CH);
    }
    // vch = total logical canvas height (game area + controls zone in portrait)
    const vch=isPortrait?Math.round(vh/s):CH;
    // Canvas buffer = exact logical size × dpr (integer scale — no sub-pixel blur)
    this.canvas.width=CW*dpr;
    this.canvas.height=vch*dpr;
    // CSS: scale canvas to fill screen; center horizontally in landscape
    this.canvas.style.width=Math.round(CW*s)+'px';
    this.canvas.style.height=Math.round(vch*s)+'px';
    this.canvas.style.left=Math.round((vw-CW*s)/2)+'px';
    this.canvas.style.top='0px';
    this._dpr=dpr;
    this._cssScale=s;
    this._isPortrait=isPortrait;
    this._vch=vch;
    this.ctx.imageSmoothingEnabled=false;
    if(this._ready)this.bg=buildBackground();
    if(this.input){
      this.input._scale=s;
      this.input._portrait=isPortrait;
      this.input._vch=vch;
    }
  }
  _initGame(){
    this.player=new Player(W/2,H/2);
    this.bullets=[];this.enemies=[];this.particles=[];this.pickups=[];
    this.score=0;this.kills=0;this.bonusTimer=0;
    this.combo=1;this.comboTimer=0;this._newRecord=false;
    this._bossKills=0;this._levelNoHit=true;this._weaponsPickedUp=0;this._scorePopups=[];
    this._achievementQueue=[];
    this._unlockedAchievements=new Set(JSON.parse(localStorage.getItem('retro_achievements')||'[]'));
    this._leaderboard=JSON.parse(localStorage.getItem('retro_assault_lb')||'[]');
    this._pendingName='';this._lbHighlight=-1;this._lbAutoTimer=3;
    this._globalLB=[]; // populated by Firebase module script after it loads
    this.level=new LevelManager(this);this.level.loadLevel(1);
  }
  _initAudio(){
    if(!this.audio)this.audio=new RetroAudio();
    try{if(this.audio.ctx&&this.audio.ctx.state==='suspended')this.audio.ctx.resume();}catch(e){}
    this.audio.startBGM();
    applyMute(_muted);
  }
  start(){requestAnimationFrame(ts=>this.loop(ts));}
  loop(ts){
    const rawDt=ts-this.last;this.last=ts;
    // Slow-mo: tick at 15% speed during boss death cinematic
    if(this._slowMo>0){
      this._slowMo-=rawDt/1000;
      if(this._slowMo<0)this._slowMo=0;
    }
    const rate=this._slowMo>0?0.15:1;
    const dt=Math.min(rawDt*rate,50);
    this.accum+=dt;
    while(this.accum>=this.STEP){this.update(this.STEP/1000);this.accum-=this.STEP;}
    this.render();requestAnimationFrame(ts2=>this.loop(ts2));
  }
  update(dt){
    switch(this.state){
      case 'START': {
        if(this.input.isDown('KeyL')){this.input.consumeAnyKey();this._lbAutoTimer=999;this.state='LEADERBOARD';break;}
        const startClicks=this.input.consumeClicks();
        let openedLb=false;
        for(const c of startClicks){
          if(c.x*2>=CW/2-70&&c.x*2<=CW/2+70&&c.y*2>=312&&c.y*2<=334){
            this._lbAutoTimer=999;this.state='LEADERBOARD';openedLb=true;break;
          }
        }
        if(!openedLb&&(startClicks.length>0||this.input.consumeAnyKey())){this._initGame();this._initAudio();this.state='PLAYING';}
        break;
      }
      case 'PLAYING':
        if(this._shake>0)this._shake=Math.max(0,this._shake-dt*12);
        this.player.update(dt,this.input,this.bullets,this.particles,this);
        this.level.update(dt);
        if(this.combo>1){this.comboTimer-=dt;if(this.comboTimer<=0)this.combo=1;}
        for(const e of this.enemies){
          if(e instanceof ShooterEnemy)e.update(dt,this.player,this.bullets);
          else if(e instanceof Boss1)e.update(dt,this.player,this.bullets);
          else if(e instanceof Boss2)e.update(dt,this.player,this.bullets,this.enemies);
          else if(e instanceof Boss3)e.update(dt,this.player,this.bullets);
          else if(e instanceof Boss4)e.update(dt,this.player,this.bullets,this.enemies);
          else if(e instanceof Boss5)e.update(dt,this.player,this.bullets,this.enemies);
          else if(e instanceof Boss6)e.update(dt,this.player,this.bullets,this.enemies);
          else e.update(dt,this.player);
        }
        for(const b of this.bullets)b.update(dt);
        for(const p of this.particles)p.update(dt);
        for(const pk of this.pickups)pk.update(dt);
        // player bullets → enemies
        for(const b of this.bullets){
          if(b.dead||b.owner!=='player')continue;
          for(const e of this.enemies){
            if(e.dead)continue;
            if(b.piercing&&b.hitEnemies.has(e))continue;
            const hit=rectsOverlap(b.x-1,b.y-1,3,3,e.x-e.w/2,e.y-e.h/2,e.w,e.h);
            if(hit){
              if(!b.piercing)b.dead=true;
              else b.hitEnemies.add(e);
              e.takeDamage(b.damage);
              if(b.freezing&&!e.isBoss){e.frozen=b.freezeDuration;e.slowFactor=0.3;}
              spawnHit(this.particles,b.x,b.y,PAL.ORANGE);
              if(this.audio)this.audio.hit();
              if(e.dead)this._onEnemyDied(e);
              if(b.explosive&&b.dead){
                spawnBlast(this.particles,b.x,b.y);
                this._shake=Math.max(this._shake,2);
                if(this.audio)this.audio.explosion();
                for(const e2 of this.enemies){
                  if(e2.dead)continue;
                  if(circlehit(b.x,b.y,e2.x,e2.y,b.blastR)){
                    e2.takeDamage(b.damage);if(e2.dead)this._onEnemyDied(e2);
                  }
                }
              }
            }
          }
        }
        // rocket explosions on walls
        for(const b of this.bullets){
          if(b.dead&&b.explosive){
            spawnBlast(this.particles,b.x,b.y);
            this._shake=Math.max(this._shake,2);
            for(const e of this.enemies){
              if(!e.dead&&circlehit(b.x,b.y,e.x,e.y,b.blastR)){
                e.takeDamage(b.damage);if(e.dead)this._onEnemyDied(e);
              }
            }
          }
        }
        // enemy/bullet → player
        if(this.player.invincible<=0){
          for(const e of this.enemies){
            if(e.dead)continue;
            if(rectsOverlap(this.player.x-5,this.player.y-6,10,12,e.x-e.w/2,e.y-e.h/2,e.w,e.h)){
              if(this.player.takeDamage()){spawnExp(this.particles,this.player.x,this.player.y,PAL.RED,8);if(this.audio)this.audio.playerHit();this._shake=3;this._levelNoHit=false;}
            }
          }
          for(const b of this.bullets){
            if(b.dead||b.owner!=='enemy')continue;
            if(rectsOverlap(b.x-1,b.y-1,3,3,this.player.x-5,this.player.y-6,10,12)){
              b.dead=true;
              if(this.player.takeDamage()){spawnExp(this.particles,this.player.x,this.player.y,PAL.RED,8);if(this.audio)this.audio.playerHit();this._shake=3;this._levelNoHit=false;}
            }
          }
        }
        for(const pk of this.pickups){
          if(pk.dead)continue;
          if(circlehit(this.player.x,this.player.y,pk.x,pk.y,pk.r+5)){
            pk.dead=true;this._applyPickup(pk.type);if(this.audio)this.audio.pickup();
          }
        }
        this._checkAchievements(dt);
        if(this.player.hp<=0){
          this._newRecord=this.score>this.highScore;
          if(this._newRecord){this.highScore=this.score;localStorage.setItem('retro_assault_hi',this.highScore);}
          if(this._qualifiesForLeaderboard()){this.state='NAME_INPUT';this._pendingName='';}
          else{this.state='GAME_OVER';if(this.audio)this.audio.gameOver();}
        }
        this.bullets=this.bullets.filter(b=>!b.dead);
        this.enemies=this.enemies.filter(e=>!e.dead);
        this.particles=this.particles.filter(p=>!p.dead).slice(-250);
        this.pickups=this.pickups.filter(pk=>!pk.dead);
        // Update score pop-ups
        for(const sp of this._scorePopups){sp.life-=dt;sp.y-=18*dt;}
        this._scorePopups=this._scorePopups.filter(sp=>sp.life>0);
        break;
      case 'LEVEL_COMPLETE':
        if(this.bonusTimer>0){this.bonusTimer-=dt;if(this.bonusTimer<=0)this.score+=this.level.currentLevel*500;}
        if(this.input.consumeAnyKey()){this._levelNoHit=true;this.level.nextLevel();}
        break;
      case 'GAME_OVER':
      case 'VICTORY':
        if(this.input.isDown('KeyR')||(this.input.isMobile&&this.input.consumeAnyKey())){
          if(this.score>this.highScore){this.highScore=this.score;localStorage.setItem('retro_assault_hi',this.highScore);}
          this._initGame();this.state='PLAYING';
        }
        break;
      case 'NAME_INPUT': break; // handled by keyboard listener
      case 'LEADERBOARD':
        if(this._shake>0)this._shake=Math.max(0,this._shake-dt*6);
        this._lbAutoTimer-=dt;
        if(this._lbAutoTimer<=0||this.input.consumeAnyKey()){
          this.input.consumeClicks(); // drain stale clicks so START doesn't immediately activate
          this.state='START';
        }
        break;
    }
  }
  _onEnemyDied(e){
    this.combo=Math.min(this.combo+1,8);this.comboTimer=3;
    const pts=e.scoreValue*this.combo;
    this.score+=pts;this.kills++;
    // Score pop-up
    const popCol=e.isBoss?'#FFD700':this.combo>=3?'#FF8800':'#FFFFFF';
    this._scorePopups.push({x:e.x,y:e.y-8,text:(this.combo>1?'x'+this.combo+' ':'')+'+'+(pts),color:popCol,life:1.2,maxLife:1.2});
    if(this.level.isBonus)this.level.bonusKills++;
    const col=e.isBoss?PAL.YELLOW:
      e instanceof TankEnemy?PAL.BROWN:e instanceof FastEnemy?PAL.CYAN:
      e instanceof ShooterEnemy?PAL.PURPLE:PAL.RED;
    spawnExp(this.particles,e.x,e.y,col,e.isBoss?30:12);
    if(e.isBoss){this._shake=5;this._slowMo=2.2;this._bossKills=(this._bossKills||0)+1;}
    if(this.audio)this.audio.die();
    const r=Math.random();
    if(e.dropChance&&r<e.dropChance){
      let type;
      if(e.dropType){type=e.dropType;}
      else{
        const roll=Math.random();
        if(roll<0.25)type='heart';
        else if(roll<0.45)type='shield';
        else if(roll<0.6)type='speed';
        else if(roll<0.7)type='ammo';
        else if(e instanceof TankEnemy)type='weapon_shotgun';
        else if(e instanceof FastEnemy)type='weapon_smg';
        else if(e instanceof ShooterEnemy)type='weapon_laser';
        else type='heart';
      }
      this.pickups.push(new Pickup(e.x,e.y,type));
    }
  }
  _applyPickup(type){
    const p=this.player;
    if(type==='heart'){p.hp=Math.min(p.hp+1,p.maxHp);}
    else if(type==='shield'){p.shield=4;}
    else if(type==='speed'){p.speedBoost=5;}
    else if(type==='ammo'){if(p.weapon!=='pistol')p.ammo[p.weapon]+=10;}
    else if(type.startsWith('weapon_')){p.pickupWeapon(type);this._weaponsPickedUp++;}
  }
  _checkAchievements(dt){
    for(const a of ACHIEVEMENTS){
      if(!this._unlockedAchievements.has(a.id)&&a.check(this)){
        this._unlockedAchievements.add(a.id);
        this._achievementQueue.push({label:a.label,desc:a.desc,timer:3.5});
        try{localStorage.setItem('retro_achievements',JSON.stringify([...this._unlockedAchievements]));}catch(e){}
      }
    }
    for(const t of this._achievementQueue)t.timer-=dt;
    this._achievementQueue=this._achievementQueue.filter(t=>t.timer>0);
  }
  _qualifiesForLeaderboard(){
    const lb=this._leaderboard;
    return this.score>0&&(lb.length<10||this.score>lb[lb.length-1].score);
  }
  _saveToLeaderboard(name){
    const entry={name:name||'???',score:this.score,level:this.level.currentLevel,date:new Date().toISOString().slice(0,10)};
    this._leaderboard.push(entry);
    this._leaderboard.sort((a,b)=>b.score-a.score);
    this._leaderboard=this._leaderboard.slice(0,10);
    this._lbHighlight=this._leaderboard.findIndex(e=>e===entry);
    try{localStorage.setItem('retro_assault_lb',JSON.stringify(this._leaderboard));}catch(e){}
    // Also push to Firebase global leaderboard
    if(window._fbSaveScore)window._fbSaveScore(entry.name,entry.score);
  }
  render(){
    const ctx=this.ctx;
    const dpr=this._dpr||1;
    // Integer DPR scale only — CSS handles the rest via image-rendering:pixelated
    ctx.setTransform(dpr,0,0,dpr,0,0);
    if(this._shake>0){ctx.translate((Math.random()-0.5)*this._shake*2,(Math.random()-0.5)*this._shake*2);}
    ctx.imageSmoothingEnabled=false;
    // Fill the area below game world (portrait controls zone) with black
    if(this._isPortrait&&this._vch>CH){
      ctx.fillStyle='#000';
      ctx.fillRect(0,CH,CW,this._vch-CH);
    }
    const playing=this.state==='PLAYING'||this.state==='LEVEL_COMPLETE'||
                  this.state==='GAME_OVER'||this.state==='VICTORY';
    ctx.save();ctx.scale(2,2);
    ctx.drawImage(this.bg,0,0);
    if(playing){
      drawAimLine(ctx,this.player,this.input.mouse);
      for(const b of this.bullets)b.draw(ctx);
      for(const p of this.particles)p.draw(ctx);
      for(const pk of this.pickups)pk.draw(ctx);
      for(const e of this.enemies)e.draw(ctx);
      // freeze overlay
      for(const e of this.enemies){
        if(e.frozen>0&&e.hitFlash<=0){
          ctx.globalAlpha=0.35;ctx.fillStyle='#C8F4FF';
          ctx.fillRect(Math.round(e.x)-e.w/2,Math.round(e.y)-e.h/2,e.w,e.h);
          ctx.globalAlpha=1;
        }
      }
      this.player.draw(ctx);
      drawCrosshair(ctx,Math.round(this.input.mouse.x),Math.round(this.input.mouse.y),this.player.weapon);
      // Score pop-ups (game space)
      if(this._scorePopups&&this._scorePopups.length){
        ctx.textAlign='center';ctx.textBaseline='middle';
        for(const sp of this._scorePopups){
          const a=sp.life/sp.maxLife;
          ctx.globalAlpha=a;
          ctx.font='bold '+(a>0.7?5:4)+'px monospace';
          ctx.fillStyle=sp.color;
          ctx.fillText(sp.text,Math.round(sp.x),Math.round(sp.y));
        }
        ctx.globalAlpha=1;ctx.textAlign='left';ctx.textBaseline='top';
      }
    }
    ctx.restore();
    if(playing){drawCRT(ctx,CW,CH);drawHUD(ctx,this);drawWeaponStrip(ctx,this);}
    if(this.state==='START'){drawCRT(ctx,CW,CH);drawStartScreen(ctx,this);}
    if(this.state==='LEVEL_COMPLETE')drawLevelComplete(ctx,this);
    if(this.state==='GAME_OVER')drawGameOver(ctx,this);
    if(this.state==='VICTORY')drawVictory(ctx,this);
    if(this.state==='NAME_INPUT')drawNameInput(ctx,this);
    if(this.state==='LEADERBOARD')drawLeaderboard(ctx,this);
    if(playing||this.state==='START')drawVirtualControls(ctx,this);
    if(this._slowMo>0)drawSlowMoOverlay(ctx,this);
    if(playing&&this._achievementQueue&&this._achievementQueue.length>0)drawAchievement(ctx,this);
  }
}

game=new Game();
game.start();
const muteBtn=document.getElementById('muteBtn');
let _muted=localStorage.getItem('retro_mute')==='1';
function applyMute(v){
  _muted=v;
  muteBtn.textContent=v?'🔇':'🔊';
  localStorage.setItem('retro_mute',v?'1':'0');
  if(game.audio)game.audio.setMuted(v);
}
applyMute(_muted);
muteBtn.addEventListener('click',()=>applyMute(!_muted));

// ── Name input — works on desktop (keydown) and mobile (DOM input) ────────────
const nameInput=document.getElementById('nameInput');

function showNameInput(){
  nameInput.value='';
  nameInput.style.display='block';
  // Small delay so the state transition renders first, then focus
  setTimeout(()=>nameInput.focus(),80);
}
function hideNameInput(){
  nameInput.blur();
  nameInput.style.display='none';
}
function submitName(){
  const name=nameInput.value.trim()||'???';
  game._saveToLeaderboard(name);
  game._lbAutoTimer=6;
  hideNameInput();
  game._shake=8; // cinematic shake after name is saved
  // Drain any stale key/click state so LEADERBOARD doesn't immediately skip
  game.input.consumeAnyKey();
  game.input.consumeClicks();
  game.state='LEADERBOARD';
}
function skipName(){
  hideNameInput();
  game.state='GAME_OVER';
}

// Sync DOM input → game._pendingName for canvas preview
nameInput.addEventListener('input',()=>{
  game._pendingName=nameInput.value;
});
nameInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){submitName();e.preventDefault();}
  else if(e.key==='Escape'){skipName();e.preventDefault();}
  e.stopPropagation(); // prevent game keys firing
});

// Also handle desktop keydown for users who don't click the input
window.addEventListener('keydown',e=>{
  if(game.state!=='NAME_INPUT')return;
  if(e.key==='Escape'){skipName();return;}
  // Desktop: if input not focused, focus it so typing works
  if(document.activeElement!==nameInput)nameInput.focus();
});

// Watch for state transitions to show/hide the DOM input
const _origInitGame=Game.prototype._initGame;
// Hook into state changes via a proxy on game.state
// We use a rAF watcher instead to avoid patching internals
let _lastState='';
(function watchState(){
  requestAnimationFrame(watchState);
  if(!game)return;
  const s=game.state;
  if(s===_lastState)return;
  _lastState=s;
  if(s==='NAME_INPUT'){showNameInput();}
  else if(nameInput.style.display==='block'){hideNameInput();}
})();
</script>

// Fetch top 10 global scores, sorted descending
window._fbFetchTop10 = async function() {
  try {
    // Fetch all entries and sort client-side (avoids needing .indexOn rule)
    const snap = await get(ref(db, 'leaderboard'));
    if (!snap.exists()) return [];
    const entries = [];
    snap.forEach(child => {
      const v = child.val();
      if (v && typeof v.name === 'string' && typeof v.score === 'number' && isFinite(v.score)) {
        entries.push({ name: v.name.slice(0, 20), score: v.score, date: v.date || '' });
      }
    });
    entries.sort((a, b) => b.score - a.score);
    return entries.slice(0, 10);
  } catch(e) { console.warn('Firebase fetch failed:', e.message); return []; }
};

// Save a score to Firebase — input sanitized before storage
window._fbSaveScore = async function(name, score) {
  const safeName = String(name).replace(/[<>"'&]/g, '').trim().slice(0, 20) || '???';
  const safeScore = Math.floor(Number(score)) || 0;
  try {
    await push(ref(db, 'leaderboard'), {
      name: safeName,
      score: safeScore,
      date: new Date().toISOString().slice(0, 10)
    });
  } catch(e) { console.warn('Firebase save failed:', e.message); }
};

// Fix race condition: module runs AFTER classic script, so game is already running.
// Immediately fetch and populate _globalLB on the live game instance.
if (typeof game !== 'undefined' && game) {
  window._fbFetchTop10().then(rows => { if (game) game._globalLB = rows; });
}
</script>
